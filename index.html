function getMatchedGroupPrefix(topicId) {
  const sorted = Object.keys(topicGroups).sort((a,b)=>b.length-a.length);
  for (const pfx of sorted) if (topicId.startsWith(pfx)) return pfx;
  return null;
}

const SCHOOL_TAG_OPTIONS = ['Lower','Middle','High'];
function normalizeGroupSchools(g) {
  const raw = Array.isArray(g && g.appliesTo) ? g.appliesTo : ['All Schools'];
  if (raw.includes('All Schools')) return ['All Schools'];
  const cleaned = raw.filter(x => SCHOOL_TAG_OPTIONS.includes(x));
  return cleaned.length ? cleaned : ['All Schools'];
}
function schoolApplicabilityLabel(g) {
  const vals = normalizeGroupSchools(g);
  return vals.includes('All Schools') ? 'All Schools' : vals.join(' + ');
}
function topicSchoolTags(topicId) {
  const pfx = getMatchedGroupPrefix(topicId);
  return normalizeGroupSchools(pfx ? topicGroups[pfx] : null);
}
function topicMatchesSchoolFilter(topicId, filter) {
  if (!filter || filter === 'all') return true;
  const vals = topicSchoolTags(topicId);
  if (filter === 'All Schools') return vals.includes('All Schools');
  return vals.includes('All Schools') || vals.includes(filter);
}
function groupSchoolChecksHtml(g) {
  const vals = normalizeGroupSchools(g);
  const isAll = vals.includes('All Schools');
  const cbStyle = 'display:inline-flex;align-items:center;gap:4px;margin-right:10px;margin-top:5px;font-size:11px;color:var(--muted)';
  return '<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:3px">'+
    '<label style="'+cbStyle+'"><input type="checkbox" class="g-school" value="All Schools" '+(isAll?'checked':'')+'> All Schools</label>'+
    SCHOOL_TAG_OPTIONS.map(v=>'<label style="'+cbStyle+'"><input type="checkbox" class="g-school" value="'+v+'" '+(!isAll&&vals.includes(v)?'checked':'')+'> '+v+'</label>').join('')+
    '</div><div style="font-size:10px;color:var(--secondary);line-height:1.4;margin-top:4px">Use All Schools for groups such as AS. For groups that only apply to certain divisions, choose one or more specific schools.</div>';
}
function readGroupSchools() {
  const picked = Array.from(document.querySelectorAll('.g-school:checked')).map(cb=>cb.value);
  if (!picked.length || picked.includes('All Schools')) return ['All Schools'];
  return picked.filter(x => SCHOOL_TAG_OPTIONS.includes(x));
}
function openEditGroupModal(pfx) {
  const g = topicGroups[pfx]; if (!g) return;
  const matchingTopicCount = Object.keys(topics).filter(id => getMatchedGroupPrefix(id) === pfx).length;
  const mc = document.getElementById('modal-container');
  mc.innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:480px">'+
    '<h2>Edit Group: '+pfx+'</h2>'+
    '<label>Prefix</label>'+
    '<input id="g-pfx" value="'+esc(pfx)+'" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">'+
    '<div id="g-pfx-err" style="color:#e74c3c;font-size:10px;min-height:14px;margin-top:2px"></div>'+
    '<div style="font-size:10px;color:var(--secondary);line-height:1.4;margin:2px 0 8px">Changing this prefix will automatically rename '+matchingTopicCount+' matching topic IDs and update every scheduled slot that uses them.</div>'+
    '<label>Group Name</label><input id="g-name" value="'+esc(g.name)+'">'+
    '<label>PD Format</label>'+
    '<select id="g-fmt">'+
      ['live','subject','async'].map(f=>'<option value="'+f+'"'+(g.fmt===f?' selected':'')+'>'+fmtLabel(f)+'</option>').join('')+
    '</select>'+
    '<label>Applicable Schools</label>'+groupSchoolChecksHtml(g)+
    '<label>Description</label><textarea id="g-desc" style="min-height:50px">'+esc(g.desc||'')+'</textarea>'+
    '<div class="modal-actions">'+
      '<button class="btn" onclick="closeModal()">Cancel</button>'+
      '<button class="btn btn-danger" onclick="deleteGroup(\''+pfx+'\')">Delete Group Only</button>'+
      '<button class="btn btn-primary" onclick="saveGroup(\''+pfx+'\')">Save</button>'+
    '</div></div></div>';
}
function saveGroup(editPfx) {
  const pfxInput = document.getElementById('g-pfx');
  const pfx = (pfxInput ? pfxInput.value : editPfx || '').trim().toUpperCase();
  const name = document.getElementById('g-name').value.trim();
  const fmt = document.getElementById('g-fmt').value;
  const desc = document.getElementById('g-desc').value.trim();
  const appliesTo = readGroupSchools();
  const errEl = document.getElementById('g-pfx-err');
  const showErr = msg => { if (errEl) errEl.textContent = msg; };
  if (!pfx) { showErr('Prefix is required.'); return; }
  if (!/^[A-Z0-9-]+$/.test(pfx)) { showErr('Use only letters, numbers, and hyphens.'); return; }
  if (!name) return;
  if (!editPfx && topicGroups[pfx]) { showErr('That prefix is already taken.'); return; }
  if (editPfx && pfx !== editPfx && topicGroups[pfx]) { showErr('That prefix is already taken.'); return; }

  if (editPfx && pfx !== editPfx) {
    const idsToRename = Object.keys(topics).filter(id => getMatchedGroupPrefix(id) === editPfx);
    const renameMap = {};
    for (const oldId of idsToRename) {
      const newId = pfx + oldId.slice(editPfx.length);
      if (topics[newId] && !idsToRename.includes(newId)) {
        showErr('Cannot rename because topic ID '+newId+' already exists.');
        return;
      }
      renameMap[oldId] = newId;
    }
    idsToRename.forEach(oldId => {
      const newId = renameMap[oldId];
      topics[newId] = {...topics[oldId], id:newId};
      delete topics[oldId];
    });
    schedule.forEach(s => {
      if (s.topicIds) s.topicIds = s.topicIds.map(id => renameMap[id] || id);
    });
    delete topicGroups[editPfx];
  }

  topicGroups[pfx] = {name, fmt, desc, appliesTo};
  closeModal(); renderRefGroups(); render(); saveAllData();
}
function deleteGroup(pfx) {
  if (!confirm('Delete group "'+pfx+'"? This removes only the group label/key. It does not delete the topics. To delete a topic, open that topic and use its Delete button.')) return;
  delete topicGroups[pfx];
  closeModal(); renderRefGroups(); render(); saveAllData();
}

const VALID_TABS = ['schedule','kanban','catalogue','evidence'];
function getTabFromLocation() {
  const params = new URLSearchParams(window.location.search);
  const tab = params.get('tab') || (window.location.hash ? window.location.hash.replace('#','') : '');
  return VALID_TABS.includes(tab) ? tab : 'schedule';
}
function setActiveTabButton() {
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===currentTab));
}
function setTab(tab, pushHistory=true) {
  if (!VALID_TABS.includes(tab)) tab = 'schedule';
  currentTab = tab;
  setActiveTabButton();
  if (pushHistory) {
    const url = new URL(window.location.href);
    url.searchParams.set('tab', tab);
    history.pushState({tab}, '', url);
  }
  render();
}
document.querySelectorAll('.nav-tab').forEach(btn => {
  btn.addEventListener('click', () => setTab(btn.dataset.tab, true));
});
window.addEventListener('popstate', () => setTab(getTabFromLocation(), false));
currentTab = getTabFromLocation();
setActiveTabButton();
function render() {
  const c = document.getElementById('main-content');
  if (currentTab==='schedule') renderSchedule(c);
  else if (currentTab==='kanban') renderKanban(c);
  else if (currentTab==='catalogue') renderCatalogue(c);
  else if (currentTab==='evidence') renderEvidence(c);
  updateBadges();
}

let scrollInterval = null;
document.addEventListener('dragover', e => {
  const edge = 80, speed = 12;
  const main = document.getElementById('main-content');
  const x = e.clientX, y = e.clientY;
  const vh = window.innerHeight, vw = window.innerWidth;
  clearInterval(scrollInterval);
  scrollInterval = setInterval(() => {
    if (y < edge) main.scrollTop -= speed;
    else if (y > vh - edge) main.scrollTop += speed;
    if (x < edge) main.scrollLeft -= speed;
    else if (x > vw - edge) main.scrollLeft += speed;
  }, 30);
});
document.addEventListener('dragend', () => clearInterval(scrollInterval));
document.addEventListener('drop', () => clearInterval(scrollInterval));

function renderSchedule(c) {

  const weeks = {};
  schedule.forEach((s,i)=>{if(!weeks[s.week])weeks[s.week]={week:s.week,date:s.date,entries:[]};weeks[s.week].entries.push({...s,_idx:i})});
  const wkNums = Object.keys(weeks).map(Number).sort((a,b)=>a-b);
  const gc = '68px '+cols.map(()=>'1fr').join(' ');

  let h = `<div class="fmt-legend">
    <div class="li"><div class="ls" style="background:var(--fmt-live)"></div>Live All-School</div>

  </div>
  <div class="stage-legend"><span style="font-size:10px;color:var(--secondary);margin-right:4px">Build stage:</span>
    ${STAGES.map(s=>'<div class="sl-item">'+stageDot(s)+' '+s+'</div>').join('')}
  </div>
  <div class="ctrl-row">
    <select id="sch-school" onchange="schFilter.school=this.value;render()">
      <option value="all">All Groups</option><option value="Lower">Lower</option><option value="Middle">Middle</option><option value="High">High</option><option value="New Tchrs">New Teachers</option><option value="New K-2">New K-2</option>
    </select>
    <select id="sch-q" onchange="schFilter.quarter=this.value;render()">
      <option value="all">All Quarters</option><option value="Q1">Q1 (Wk 1–9)</option><option value="Q2">Q2 (Wk 10–17)</option><option value="Q3">Q3 (Wk 18–27)</option><option value="Q4">Q4 (Wk 28–36)</option>
    </select>
    <select id="pool-school" onchange="poolSchool=this.value;render()">
      <option value="all">Topic Pool: Any School Tag</option><option value="Lower">Lower Topics</option><option value="Middle">Middle Topics</option><option value="High">High Topics</option><option value="All Schools">All-School Topics Only</option>
    </select>
  </div>
  <div class="topic-pool">
    <div class="pool-hdr">
      <span>📦 Topic Pool — drag to assign, click to view</span>
      <div class="pool-filters">
        <button class="pf-btn f-all ${poolFmt==='all'?'active':''}" onclick="poolFmt='all';render()">All</button>
        <button class="pf-btn f-live ${poolFmt==='live'?'active':''}" onclick="poolFmt='live';render()">Live</button>
        <button class="pf-btn f-subject ${poolFmt==='subject'?'active':''}" onclick="poolFmt='subject';render()">Subject</button>
        <button class="pf-btn f-async ${poolFmt==='async'?'active':''}" onclick="poolFmt='async';render()">Async</button>

      </div>

          h += '</div></div>';
        });

      } else {
        h += '<div class="school-col" data-week="'+wk+'" data-col="'+colName+'" ondragover="onDO(event)" ondragleave="onDL(event)" ondrop="onSD(event)">';
        if (entries.length===0) { h+='<span class="empty-slot">—</span>'; }

          else{h+='<span class="empty-slot">no topic</span>'}
          h+='</div></div>';
        });}
        h += '</div>';

    h += '</div>';

function filterPool(v){
  const b=document.getElementById('pool-body');if(!b)return;
  const lv=v.toLowerCase();
  b.querySelectorAll('.topic-tag').forEach(tag=>{const id=tag.dataset.id;const t=topics[id];const title=(t&&t.title?t.title:'').toLowerCase();tag.style.display=(!lv||id.toLowerCase().includes(lv)||title.includes(lv))?'':'none'});
}

function setupDrag() {
  document.querySelectorAll('#pool-body .topic-tag[draggable]').forEach(el=>{
    el.addEventListener('dragstart', e=>{el.classList.add('dragging');e.dataTransfer.setData('topicId',el.dataset.id);e.dataTransfer.setData('fromSlot','');});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  });
  // Also make slot tags draggable (copy, not move)
  document.querySelectorAll('.school-col .topic-tag').forEach(el=>{
    el.setAttribute('draggable','true');
    el.addEventListener('dragstart',e=>{
      e.stopPropagation();
      el.classList.add('dragging');
      e.dataTransfer.setData('topicId',el.dataset.id);
      e.dataTransfer.setData('fromSlot', el.dataset.fromSlot||'');
    });
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  });
}
function onDO(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function onDL(e){e.currentTarget.classList.remove('drag-over')}
function onSD(e){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  const id=e.dataTransfer.getData('topicId');if(!id)return;
  const wk=parseInt(e.currentTarget.dataset.week);const col=e.currentTarget.dataset.col;

function getTopicNumberInfo(id, prefix) {
  if (!id || !prefix || !id.startsWith(prefix)) return null;
  const rest = id.slice(prefix.length);
  const m = rest.match(/^(-?)(\d+)$/);
  if (!m) return null;
  return {sep:m[1], num:parseInt(m[2],10), width:m[2].length};
}
function getTopicGroupPrefix(id) {
  const sorted = Object.keys(topicGroups).sort((a,b)=>b.length-a.length);
  for (const pfx of sorted) if (id && id.startsWith(pfx)) return pfx;
  return '';
}
function getGroupNumberStyle(prefix) {
  const ids = Object.keys(topics).filter(id=>getTopicNumberInfo(id,prefix)).sort(topicIdCompare);
  if (ids.length) {
    const info = getTopicNumberInfo(ids[0], prefix);
    return {sep:info.sep, width:Math.max(2, info.width)};
  }
  return {sep:'-', width:2};
}
function makeTopicId(prefix, num) {
  const style = getGroupNumberStyle(prefix);
  return prefix + style.sep + String(num).padStart(style.width, '0');
}
function topicIdCompare(a,b) {
  const pa=getTopicGroupPrefix(a), pb=getTopicGroupPrefix(b);
  if (pa!==pb) return a.localeCompare(b, undefined, {numeric:true});
  const ia=getTopicNumberInfo(a,pa), ib=getTopicNumberInfo(b,pb);
  if (ia && ib && ia.num!==ib.num) return ia.num-ib.num;
  return a.localeCompare(b, undefined, {numeric:true});
}
function getGroupTopicIds(prefix, excludeId) {
  return Object.keys(topics).filter(id=>id!==excludeId && getTopicNumberInfo(id,prefix)).sort(topicIdCompare);
}
function renderPlacementOptions(prefix, editId) {
  const sel = document.getElementById('m-place-after');
  if (!sel) return;
  if (!prefix) { sel.innerHTML = '<option value="">Select a group first</option>'; return; }
  const ids = getGroupTopicIds(prefix, editId);
  sel.innerHTML = '<option value="">At beginning of group</option>' + ids.map(id=>'<option value="'+esc(id)+'">After '+esc(id)+' — '+esc((topics[id]||{}).title||'')+'</option>').join('');
}
function previewTopicIdFromPlacement() {
  const auto = document.getElementById('m-auto-id');
  if (auto && !auto.checked) return;
  const group = document.getElementById('m-group')?.value || '';
  const afterId = document.getElementById('m-place-after')?.value || '';
  const idInput = document.getElementById('m-id');
  if (!group || !idInput) return;
  let targetNum = 1;
  if (afterId) {
    const info = getTopicNumberInfo(afterId, group);
    if (info) targetNum = info.num + 1;
    else targetNum = getGroupTopicIds(group, idInput.dataset.editId || '').length + 1;
  }
  idInput.value = makeTopicId(group, targetNum);
}
function syncTopicPlacement() {
  const group = document.getElementById('m-group')?.value || '';
  const idInput = document.getElementById('m-id');
  const editId = idInput?.dataset.editId || '';
  renderPlacementOptions(group, editId);
  previewTopicIdFromPlacement();
}
function applySequentialTopicPlacement(editId, topicData, targetPrefix, afterId) {
  const targetIds = getGroupTopicIds(targetPrefix, editId);
  const entries = targetIds.map(id=>({oldId:id, topic:topics[id]}));
  let insertIndex = 0;
  if (afterId) {
    const idx = entries.findIndex(e=>e.oldId===afterId);
    insertIndex = idx >= 0 ? idx + 1 : entries.length;
  }
  entries.splice(insertIndex, 0, {oldId:editId || null, topic:topicData, isMoved:true});

  const renameMap = {};
  const newTopics = {...topics};
  if (editId) delete newTopics[editId];
  entries.forEach(e => { if (e.oldId) delete newTopics[e.oldId]; });

  entries.forEach((e, i) => {
    const newId = makeTopicId(targetPrefix, i + 1);
    if (e.oldId) renameMap[e.oldId] = newId;
    const nextTopic = {...e.topic, id:newId};
    if (e.isMoved) Object.assign(nextTopic, topicData, {id:newId});
    newTopics[newId] = nextTopic;
  });

  Object.keys(topics).forEach(id=>delete topics[id]);
  Object.assign(topics, newTopics);

  schedule.forEach(s => {
    if (s.topicIds) s.topicIds = s.topicIds.map(id => renameMap[id] || id);
  });
  return entries[insertIndex].topic.id;
}

function closeModal(){document.getElementById('modal-container').innerHTML=''}

function saveTopic(editId, sessionIdx) {
  const idInput = document.getElementById('m-id');
  const selectedGroup = document.getElementById('m-group')?.value || '';
  const afterId = document.getElementById('m-place-after')?.value || '';
  const autoId = !!document.getElementById('m-auto-id')?.checked;
  let newId = idInput.value.trim();
  const title = document.getElementById('m-title').value.trim();
  const errEl = document.getElementById('m-id-err');
  if (!title){if(errEl)errEl.textContent='Title is required.';return}
  if (autoId && selectedGroup) {
    previewTopicIdFromPlacement();
    newId = idInput.value.trim();
  }
  if (!newId){if(errEl)errEl.textContent='Topic ID is required.';return}
  if (!autoId && newId!==editId && topics[newId]) {if(errEl)errEl.textContent='That ID is already taken.';return}
  const existing = editId ? topics[editId] : {};
  const updated = {
    id: newId, title,
    lean: document.getElementById('m-lean').value,
    description: document.getElementById('m-desc').value.trim(),
    outcomes: document.getElementById('m-out').value.trim(),
    evidence: document.getElementById('m-ev').value.trim(),
    fileLinks: existing.fileLinks || [],
  };

  if (autoId && selectedGroup) {
    applySequentialTopicPlacement(editId || null, updated, selectedGroup, afterId);
  } else {
    if (editId && newId !== editId) {
      delete topics[editId];
      schedule.forEach(s=>{if(s.topicIds){s.topicIds=s.topicIds.map(id=>id===editId?newId:id);}});
    }
    topics[newId] = updated;
  }
  closeModal(); render(); renderRefGroups(); saveAllData();
}
function deleteTopic(id){
  if(!confirm('Delete '+id+'?'))return;
  delete topics[id];
  schedule.forEach(s=>{if(s.topicIds)s.topicIds=s.topicIds.filter(t=>t!==id)});
  closeModal();render(); saveAllData();
}

  h += '<div style="overflow-x:auto"><table class="cat-table"><thead><tr>'+
    '<th>ID</th><th>Title</th><th>Lean</th><th>Schools</th><th>Description</th><th>Learning Outcomes</th><th>Evidence Base</th><th>Assigned</th><th></th>'+
    '</tr></thead><tbody id="cat-table-body"></tbody></table></div>';
  c.innerHTML = h;
  document.getElementById('cat-id-filter').addEventListener('input', e=>{catIdSearch=e.target.value;renderCatalogueRows();});
  document.getElementById('cat-text-filter').addEventListener('input', e=>{catSearch=e.target.value;renderCatalogueRows();});
  document.getElementById('cat-lean-filter').addEventListener('change', e=>{catLean=e.target.value;renderCatalogueRows();});
  document.getElementById('cat-school-filter').addEventListener('change', e=>{catSchool=e.target.value;renderCatalogueRows();});
  renderCatalogueRows();
}

// ════════════════════════════════
// EVIDENCE BASE TAB
// ════════════════════════════════
function renderEvidence(c) {
  const evMap = buildEvidenceMap();
  const entries = Object.entries(evMap).sort((a,b)=>b[1].size-a[1].size);
  const filtered = evSearch
    ? entries.filter(([cite])=>cite.toLowerCase().includes(evSearch.toLowerCase()))
    : entries;

  let h = '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">'+entries.length+' unique citations drawn from topic evidence fields. Sorted by usage. Click a topic to open it.</div>'+
    '<input class="ev-search" placeholder="Search citations..." value="'+esc(evSearch)+'" oninput="evSearch=this.value;render()">';

  if (filtered.length===0) { h+='<div style="color:var(--secondary);font-size:13px">No matching citations.</div>'; }
  filtered.forEach(([cite,idSet])=>{
    const ids = [...idSet];
    h += '<div class="ev-card">'+
      '<div class="ev-card-text">'+esc(cite)+'</div>'+
      '<div class="ev-topic-pills">'+
        ids.map(id=>{
          const t=topics[id];if(!t)return'';
          const fmt=topicFmt(id);
          return '<span class="topic-tag fmt-'+fmt+'" onclick="openTopicModal(\''+id+'\')" style="cursor:pointer">'+id+'</span>';
        }).join('')+
      '</div>'+
    '</div>';
  });
  c.innerHTML = h;
}

// ════════════════════════════════
// BADGES
// ════════════════════════════════
function updateBadges(){
  const tabs=document.querySelectorAll('.nav-tab');
  const active=schedule.filter(s=>s.topicIds&&s.topicIds.length>0&&s.status!=='Unassigned').length;
  const evCount=Object.keys(buildEvidenceMap()).length;
  tabs[0].innerHTML='Schedule <span class="badge">'+schedule.length+'</span>';
  tabs[1].innerHTML='Build Tracker <span class="badge">'+active+'</span>';
  tabs[2].innerHTML='Topic Catalogue <span class="badge">'+Object.keys(topics).length+'</span>';
  tabs[3].innerHTML='Evidence Base <span class="badge">'+evCount+'</span>';
}

initFirebaseAuth();
</script>
