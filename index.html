// ════════════════════════════════
const topics = {"VR-T01": {"id": "VR-T01", "title": "Environment Design that Does Pedagogical Work", "lean": "Technical", "description": "Go beyond default templates. Build environments where lighting, scale, object placement, and atmosphere are deliberately chosen to support a learning goal \u2014 not just decorate it.", "outcomes": "Teachers leave with a redesigned environment for one unit, a checklist of design decisions tied to learning goals, and language to explain *why* a space is built the way it is.", "evidence": "CAMIL identifies presence and agency as the affordances that distinguish IVR from flat media (Makransky & Petersen, 2021); thoughtful environment design is how those affordances get activated rather than wasted on novelty."}, "VR-T02": {"id": "VR-T02", "title": "3D Asset Creation with Blender \u2014 Foundations", "lean": "Technical", "description": "Hands-on intro to Blender: navigating 3D space, basic mesh editing, applying materials, and exporting assets in VR-compatible formats. No prior experience required.", "outcomes": "Teachers leave able to model and export a simple custom object for use in their VR environment. Realistic ceiling: one usable asset per teacher.", "evidence": "Maker-centered VR work expands the affordances teachers can offer (Caratachea & Jones, 2024); custom asset creation is the highest-ceiling content skill for spatial computing teachers."}, "VR-T03": {"id": "VR-T03", "title": "3D Asset Creation with Blender \u2014 Optimization & Import", "lean": "Technical", "description": "Follow-on to Blender Foundations. Optimize geometry and texture sizes for VR performance, troubleshoot common import issues, and place custom assets into a VR lesson environment.", "outcomes": "Teachers leave with a custom-built asset imported into a working VR scene plus a personal troubleshooting log for future imports.", "evidence": "Cognitive load research in VR shows that performance issues (frame drops, asset popping) increase extraneous cognitive load and degrade learning (Andersen & Makransky, 2021); optimization is a pedagogical skill, not just a technical one."}, "VR-T04": {"id": "VR-T04", "title": "Building Interactive Lessons: Triggers, Logic, and Student Choice", "lean": "Technical", "description": "Move from 'walk around and look' to lessons that respond to student actions. Use interactive features and branching logic to build experiences where the student is the agent, not a passenger.", "outcomes": "Teachers leave with one branching or trigger-based lesson built, plus a design pattern they can reuse across units.", "evidence": "Agency is one of two core CAMIL affordances of IVR; without interactivity, VR collapses toward video (Makransky & Petersen, 2021; Petersen et al., 2022)."}, "VR-T05": {"id": "VR-T05", "title": "Desktop and Hybrid Delivery: Designing for Mixed-Modality Classrooms", "lean": "Blended", "description": "Run VR lessons when not every student has a headset, when a student opts out, or when a desktop view is genuinely the right tool. Build parallel pathways rather than workarounds.", "outcomes": "Teachers leave with one lesson redesigned for hybrid delivery and a UDL-aligned decision rubric for when to use which modality.", "evidence": "UDL 3.0 (CAST, 2024) Multiple Means of Engagement and Action & Expression both demand modal flexibility; relying on a single modality creates barriers."}, "VR-P01": {"id": "VR-P01", "title": "Assessment in Spatial Computing: Capturing What Students Did", "lean": "Pedagogical", "description": "Rubrics, artifacts, and evidence-of-learning practices for VR work. Screenshots, recordings, student-built objects, and walkthrough narrations as evidence.", "outcomes": "Teachers leave with a rubric draft for one VR-based assessment plus a workflow for collecting and storing student VR artifacts in Canvas.", "evidence": "Procedural knowledge transfer is one of CAMIL's three learning outcomes; capturing it requires assessment methods beyond traditional written work (Makransky & Petersen, 2021)."}, "VR-P02": {"id": "VR-P02", "title": "Designing for Student Agency in Immersive Space", "lean": "Blended", "description": "Build environments and tasks where students make real decisions, not just navigate guided tours. Self-determination theory applied to spatial environments.", "outcomes": "Teachers leave with a redesigned lesson that swaps at least three teacher-directed moments for genuine student choice points.", "evidence": "Self-determination theory (Ryan & Deci, 2020) maps onto CAMIL's agency affordance; presence + agency together predict factual, conceptual, and procedural learning gains."}, "VR-P03": {"id": "VR-P03", "title": "Universal Design for Learning in Spatial Computing", "lean": "Pedagogical", "description": "UDL 3.0 applied to immersive environments. Multiple means of engagement, representation, and action & expression \u2014 including headset fatigue, nausea, fit, and the student for whom VR isn't workable. Constraints as design inputs.", "outcomes": "Teachers leave with a UDL audit of one VR unit and at least three planned variations for student access.", "evidence": "UDL Guidelines 3.0 (CAST, 2024) explicitly center identity and learner variability; VR's physical and sensory constraints make UDL planning more, not less, important."}, "VR-P04": {"id": "VR-P04", "title": "Technology Integration Frameworks: SAMR, TPACK, and PICRAT", "lean": "Pedagogical", "description": "Three frameworks teachers can use to articulate *why* a VR choice is the right tool for the moment. Vocabulary for defending pedagogical choices when parents, admin, or accreditors ask.", "outcomes": "Teachers leave able to use one framework to evaluate an existing lesson and revise toward the 'transformation' end.", "evidence": "PICRAT (Kimmons, Graham, & West, 2020) was developed specifically to address gaps in SAMR and TPACK for teacher prep; the combination gives teachers vocabulary for intentional, defensible tech integration."}, "VR-P05": {"id": "VR-P05", "title": "Conducting Classroom Action Research on Your VR Practice", "lean": "Pedagogical", "description": "A lightweight action research cycle for teachers: identify a question, collect simple data (exit tickets, observation notes, student artifacts), analyze, adjust. Builds the evidence base for what works in your room.", "outcomes": "Teachers leave with a one-page action research plan for one unit and a data-collection schedule.", "evidence": "Classroom Action Research (Mertler, 2021) gives teachers a structured, low-burden way to generate evidence about their own practice; widely used in K-12 teacher research traditions (Stringer, 2007)."}, "VR-P06": {"id": "VR-P06", "title": "Content-Specific Pedagogy in Virtual Space \u2014 Foundations", "lean": "Pedagogical", "description": "What does *good pedagogy in your subject* look like when the classroom is spatial? Subject-specific affordances, constraints, and design moves for each content area.", "outcomes": "Teachers leave with a subject-specific 'what works in VR / what doesn't' map for their content and a redesigned lesson aligned to it.", "evidence": "VR's effectiveness varies sharply by subject and task type (Villena-Taranilla et al., 2022, K-6 meta-analysis); generic VR PD underserves teachers in subjects where the fit is more nuanced."}, "AI-T01": {"id": "AI-T01", "title": "AI for Lesson Planning and Differentiation", "lean": "Technical", "description": "Structured workflows for using AI in planning: tiered assignments, leveled reading adaptations, rubric generation from standards. Moves past 'ask the bot for ideas.'", "outcomes": "Teachers leave with a documented workflow they can repeat plus three differentiated versions of one current assignment.", "evidence": "Aligned to UNESCO AI Competency Framework for Teachers (2024) 'Pedagogy of AI' domain and AILit Framework (OECD/EC, 2025) 'Create with AI' competencies."}, "AI-T02": {"id": "AI-T02", "title": "AI for Formative Assessment and Feedback", "lean": "Blended", "description": "Using AI to analyze student writing, generate personalized feedback prompts, and build quick formative checks. Includes critical verification \u2014 never publish AI feedback without checking it.", "outcomes": "Teachers leave with one formative assessment workflow using AI and a verification checklist for AI-generated feedback.", "evidence": "AILit 'Manage AI' competency (OECD/EC, 2025) emphasizes critical evaluation; research on prompting literacy underscores that AI output quality depends heavily on instruction design (Lo, 2023; Ekin, 2023)."}, "AI-T03": {"id": "AI-T03", "title": "AI Prompt Design for Teachers", "lean": "Technical", "description": "How to write prompts that get useful output the first time. Role/context/constraints/examples patterns, iterative refinement, and saving prompts as reusable templates.", "outcomes": "Teachers leave with a personal library of 5\u201310 reusable prompts tied to their specific teaching tasks.", "evidence": "Prompting literacy is now treated as foundational AI competency (TeachAI/OECD AILit Framework, 2025); structured prompt design measurably improves output quality (Ekin, 2023)."}, "AI-T04": {"id": "AI-T04", "title": "Spatial Computing + AI: Where VR and AI Meet", "lean": "Technical", "description": "AI as a design partner for in-VR experiences: prompting AI to draft 3D-ready content, using in-world AI characters pedagogically, and where in-VR AI is genuinely additive vs. gimmicky.", "outcomes": "Teachers leave with one VR lesson that meaningfully uses an AI element, with a rationale for why AI is the right tool there.", "evidence": "Emerging research positions spatial computing + AI as the next phase of immersive learning (Jiang et al., 2025); critical evaluation matters as much as enthusiasm."}, "AI-P01": {"id": "AI-P01", "title": "Ethical AI Use: A Classroom Framework", "lean": "Pedagogical", "description": "Beyond policy compliance. Model good AI use for students, design assignments that are AI-resistant where needed and AI-enhanced where appropriate, talk to students about what AI is and isn't.", "outcomes": "Teachers leave with a one-page classroom AI policy and at least one assignment redesigned for intentional AI integration.", "evidence": "UNESCO AI Competency Framework for Teachers (2024) and AILit (OECD/EC, 2025) both name ethical use as foundational; teacher modeling is the primary pathway for student AI literacy."}, "AI-P02": {"id": "AI-P02", "title": "Designing AI-Enhanced and AI-Resistant Assignments", "lean": "Pedagogical", "description": "When should an assignment invite AI use, and when should it foreclose it? Practical design patterns: process-visible work, oral defense, in-class drafting, AI-as-tutor vs. AI-as-author.", "outcomes": "Teachers leave with two redesigned assignments \u2014 one AI-enhanced, one AI-resistant \u2014 plus reasoning notes for each.", "evidence": "Process-focused and oral-defense assessments emerge as durable patterns in K-12 AI research (Lee et al., 2024; Li et al., 2024)."}, "AI-P03": {"id": "AI-P03", "title": "Teaching Students AI Literacy: A Practical Roadmap", "lean": "Pedagogical", "description": "What students need to know about AI by grade band, anchored to the AILit Framework's four domains: Engage with AI, Create with AI, Manage AI, Design AI. Translates a global framework into classroom moves.", "outcomes": "Teachers leave with three classroom moves they can use within two weeks, mapped to AILit competencies appropriate for their grade band.", "evidence": "AILit Framework (OECD/EC, 2025) and UNESCO AI Competency Framework for Students (2024); both treat AI literacy as a K-12 priority, not an elective."}, "BL-01": {"id": "BL-01", "title": "Design Thinking for Lesson Design", "lean": "Blended", "description": "Empathize/Define/Ideate/Prototype/Test as a lesson design method. Teachers identify a real classroom problem, ideate, prototype a lesson, test in a low-stakes way.", "outcomes": "Teachers leave with a prototype lesson tied to a real classroom problem plus a test-and-iterate plan.", "evidence": "Design thinking adapts well to teacher PD as a creativity and innovation framework (Henriksen, Richardson, & Mehta, 2017; Henriksen, Gretter, & Richardson, 2020)."}, "BL-02": {"id": "BL-02", "title": "Cognitive Load and Lesson Pacing in Immersive Environments", "lean": "Pedagogical", "description": "Why VR lessons that 'felt great' sometimes produce thin learning. Intrinsic vs. extraneous vs. germane cognitive load, with concrete design moves to manage each.", "outcomes": "Teachers leave with a cognitive-load audit of one VR lesson and three concrete revisions to lower extraneous load.", "evidence": "Cognitive load in VR is empirically distinct from flat-screen learning (Andersen & Makransky, 2021); CAMIL identifies load as a key mediator of learning outcomes."}, "BL-03": {"id": "BL-03", "title": "Live Showcase Prep & Peer Critique Protocols", "lean": "Blended", "description": "Preparing for VR Showcase weeks (Q1, Q2, Q3, Q4). Structured peer critique using tuning protocols (warm/cool feedback, charrettes) so feedback actually improves lessons rather than performing politeness.", "outcomes": "Teachers leave Showcase-ready with at least two peer critiques received and incorporated.", "evidence": "Tuning protocols are well-established in teacher professional learning communities (McDonald et al., 2013, *The Power of Protocols*); structured feedback outperforms unstructured collegial conversation."}, "BL-04": {"id": "BL-04", "title": "Closing the Loop: Year-End Reflection & Lesson Archiving", "lean": "Pedagogical", "description": "End-of-year practice: what worked, what didn't, what to archive, what to retire. Reflective protocols + a lightweight documentation routine that makes next year easier.", "outcomes": "Teachers leave with an archived 'lessons that worked' folder in OneDrive and one written reflection per major unit.", "evidence": "Reflective practice with structured artifacts produces stronger transfer than open reflection alone (Sch\u00f6n, 1984; Brookfield, 2017)."}, "MATH-01": {"id": "MATH-01", "title": "Algebra and Symbolic Math in Virtual Space: Right Tool, Wrong Tool", "lean": "Blended", "description": "Math is a known constraint case for VR. Map which math tasks benefit from spatial representation (geometry, modeling, embodied number sense) and which are genuinely better on a screen or whiteboard.", "outcomes": "Teachers leave with a personal 'what goes in VR / what doesn't' decision chart for their math units.", "evidence": "K-6 VR meta-analysis (Villena-Taranilla et al., 2022) shows uneven effects in math; subject affordances matter."}, "MATH-02": {"id": "MATH-02", "title": "Embodied Mathematics: Manipulatives, Scale, and Spatial Reasoning", "lean": "Pedagogical", "description": "Where VR genuinely excels in math: walking through scale models, manipulating 3D geometric forms, embodied number lines, gesture-based reasoning.", "outcomes": "Teachers leave with one embodied-math lesson designed for VR plus a comparison lesson designed for flat tools, for explicit reflection on the difference.", "evidence": "Embodied cognition research (Lakoff & N\u00fa\u00f1ez, 2000; Nathan, 2021) and VR-specific spatial reasoning studies support gesture-and-scale approaches to math."}, "MATH-03": {"id": "MATH-03", "title": "AI for Math Problem Sequencing and Worked Examples", "lean": "Technical", "description": "Using AI to generate scaffolded problem sequences, worked examples at multiple levels, and targeted formative checks. Verification is non-negotiable \u2014 AI gets math wrong silently.", "outcomes": "Teachers leave with one AI-generated, teacher-verified problem set ready for use.", "evidence": "Worked-example research (Sweller et al., 2011) is one of the most consistently supported instructional methods; AI lowers the labor cost of producing them while raising the verification burden."}, "ELA-01": {"id": "ELA-01", "title": "Performance, Voice, and Presence: ELA in Spatial Environments", "lean": "Pedagogical", "description": "ELA's strongest VR affordances are performance and presence \u2014 staging readings, embodying characters, walking through literary spaces. Design lessons that lean into these rather than reproducing flat-screen tasks.", "outcomes": "Teachers leave with one performance- or place-based ELA lesson designed for VR.", "evidence": "ELA-VR work consistently outperforms when it leverages embodiment and presence rather than text display (Ye, Thrasher, & Kaplan-Rakowski, 2024; Chun et al., 2022)."}, "ELA-02": {"id": "ELA-02", "title": "Writing in the Age of Generative AI: What ELA Teachers Actually Do", "lean": "Pedagogical", "description": "Practical responses to generative AI in writing instruction: process-visible drafts, in-class composition, AI-as-research-assistant vs. AI-as-author, and assessment redesigns that survive the new normal.", "outcomes": "Teachers leave with one redesigned writing unit and a defensible classroom policy.", "evidence": "Emerging consensus in ELA pedagogy emphasizes process visibility and oral defense (Lee et al., 2024); aligns with AILit 'Manage AI' competency."}, "ELA-03": {"id": "ELA-03", "title": "Building Immersive Literary Environments", "lean": "Technical", "description": "Reconstructing the setting of a novel, building a poet's room, walking through a historical period via the literature of that period. Environment-as-text.", "outcomes": "Teachers leave with one literary environment built (or planned) plus a student task set tied to it.", "evidence": "Environment-as-text aligns with situated cognition (Brown, Collins, & Duguid, 1989) and place-based learning traditions."}, "HIS-01": {"id": "HIS-01", "title": "Place-Based History: Designing Virtual Field Trips That Teach", "lean": "Blended", "description": "Move beyond 'go look at the Colosseum.' Build VR field trips with embedded inquiry tasks, source comparison stops, and analytic moves \u2014 not just sightseeing.", "outcomes": "Teachers leave with one virtual field trip redesigned to include at least three inquiry tasks tied to historical thinking skills.", "evidence": "Historical thinking frameworks (Wineburg, 2001; Stanford History Education Group) emphasize sourcing, contextualization, and corroboration \u2014 VR field trips that skip these are tourism, not history."}, "HIS-02": {"id": "HIS-02", "title": "Source Work and Document Analysis in Spatial Environments", "lean": "Pedagogical", "description": "Historical documents and artifacts in 3D space. Designing lessons where students examine sources at scale, compare, and reason \u2014 using VR's presence affordance to make abstract sourcing feel concrete.", "outcomes": "Teachers leave with one source-analysis lesson designed for spatial display.", "evidence": "Document-based historical reasoning is widely supported (Reisman, 2012); spatial presence may lower the affective barrier to engaging with archival material."}, "HIS-03": {"id": "HIS-03", "title": "AI as Historical Thinking Partner \u2014 and Where It Fails", "lean": "Blended", "description": "Using AI for primary source paraphrase, contextual background, and counterfactual probing. Equally important: where AI invents history, misattributes, and flattens perspective.", "outcomes": "Teachers leave with one inquiry-based lesson that uses AI critically and one student-facing handout on AI's historical failures.", "evidence": "Historical thinking requires sourcing and corroboration (Wineburg, 2001); AI's well-documented hallucination rates make this an ideal subject for critical AI literacy."}, "SCI-01": {"id": "SCI-01", "title": "Active Doing in VR: Designing Inquiry-Based Science Lessons", "lean": "Blended", "description": "Science's natural fit with VR comes from active manipulation: dissection, lab simulation, scale shifts (cellular to cosmic). Designing lessons where the student is the experimenter, not the audience.", "outcomes": "Teachers leave with one inquiry-based VR science lesson redesigned for active student manipulation rather than guided observation.", "evidence": "VR-in-science meta-analyses show strongest effects when students are active manipulators rather than observers (Villena-Taranilla et al., 2022; Jiang et al., 2025)."}, "SCI-02": {"id": "SCI-02", "title": "Modeling and Scale: Using VR's Unique Affordances in Science", "lean": "Pedagogical", "description": "Cellular, microscopic, planetary, and cosmological scales \u2014 the cases where VR genuinely shows students something they cannot otherwise see. Design moves to make scale-shift produce understanding, not just awe.", "outcomes": "Teachers leave with one scale-based science lesson and a debrief protocol that tests whether students built the intended mental model.", "evidence": "Spatial cognition research supports scale-based instruction for abstract science (Newcombe & Shipley, 2015); CAMIL embodiment factor supports immersive scale work."}, "SCI-03": {"id": "SCI-03", "title": "Lab Safety, Replication, and Procedural Learning in VR", "lean": "Blended", "description": "VR is exceptional for procedural science learning \u2014 labs, safety protocols, techniques. Practice in low-cost, low-risk virtual settings before (or alongside) physical labs.", "outcomes": "Teachers leave with one procedural science lesson designed for VR and a transfer plan to physical lab.", "evidence": "Procedural knowledge transfer is well-supported in CAMIL (Makransky & Petersen, 2021); VR's safety and replication affordances are particularly strong for lab procedures."}, "LANG-01": {"id": "LANG-01", "title": "Latin and Classical Languages in Spatial Space", "lean": "Blended", "description": "Where VR helps classical languages (immersive Roman/Greek contexts, place-based vocabulary, performance of speeches) and where it gets in the way (reference lookups, dense morphology drills). Build a hybrid practice.", "outcomes": "Teachers leave with one classical-language lesson designed for VR and a list of tasks they will explicitly keep on flat tools.", "evidence": "L2 VR research (Ye et al., 2024; Chun et al., 2022) shows clear gains in vocabulary acquisition through immersive context; reference work remains better on flat tools."}, "LANG-02": {"id": "LANG-02", "title": "Modern Language Speaking Practice in VR", "lean": "Pedagogical", "description": "Using VR for low-stakes speaking practice \u2014 conversation partners, role plays, navigating immersive contexts. Reducing the affective filter that blocks spoken L2 production.", "outcomes": "Teachers leave with one speaking-focused VR lesson and an assessment of student talk time vs. teacher talk time.", "evidence": "Frontiers in Psychology (2025) systematic review of K-12 L2 VR RCTs shows positive effects on speaking outcomes; affective filter reduction is a recurring mechanism (Kaplan-Rakowski & Thrasher, 2025)."}, "LANG-03": {"id": "LANG-03", "title": "Arts in Spatial Space: Making, Showing, Critiquing", "lean": "Technical", "description": "VR as studio, gallery, and stage. Building, displaying, and critiquing student art work in immersive space. Includes the workflow for showcasing student work across the school.", "outcomes": "Teachers leave with one arts unit redesigned to use VR for student creation, display, or critique.", "evidence": "Maker-centered VR research (Caratachea & Jones, 2024) and presence-based critique literature support immersive art-making and gallery work."}, "LOW-01": {"id": "LOW-01", "title": "Headset Routines and Classroom Management for 3rd-5th", "lean": "Pedagogical", "description": "Elementary-specific routines for the grades that actually wear headsets (3rd in Q3+, 4th, 5th): getting on/off, managing transitions, knowing when a child needs a break. Builds the operational baseline that makes everything else possible. Note: K-2 do not use headsets \u2014 see K1-04 / K1-05 for K-2 routine work.", "outcomes": "Teachers leave with a documented daily routine for VR transitions plus signals/cues tested with their grade band.", "evidence": "Early-childhood research on transitions and routines (Hemmeter et al., 2016) maps directly onto VR-specific classroom management; routine clarity is especially important for younger learners."}, "LOW-02": {"id": "LOW-02", "title": "Spatial Learning Across the Elementary Day: Cross-Subject Design (3rd-5th)", "lean": "Blended", "description": "For grades that actually use VR (3rd Q3+, 4th, 5th): design moves where one VR environment or asset library serves math, ELA, science, and social studies \u2014 reducing setup burden while maintaining content integrity.", "outcomes": "Teachers leave with one shared environment plus mapped applications across at least three subjects.", "evidence": "Multi-subject elementary structure is the norm, not the exception (Hadley & Sandholtz, 2021); PD that assumes subject silos underserves elementary teachers."}, "LOW-03": {"id": "LOW-03", "title": "Story-Based Learning in Spatial Environments (3rd-5th)", "lean": "Pedagogical", "description": "For grades that actually use VR (3rd Q3+, 4th, 5th): narrative as the elementary instructional spine, with the environment as part of the story. Note: K-2 narrative work happens without headsets \u2014 see K1-04 for the no-VR version.", "outcomes": "Teachers leave with one story-driven VR unit plus a read-aloud-to-immersive bridge.", "evidence": "Narrative as a learning frame is foundational in elementary pedagogy (Bruner, 1986); presence and embodiment in VR amplify narrative engagement (Makransky & Mayer, 2022)."}, "LOW-04": {"id": "LOW-04", "title": "Building a K-5 Continuum: How Experiential Learning Becomes VR Learning", "lean": "Pedagogical", "description": "Mapping the K-5 progression in your school. What does K experiential learning look like, and how does it set up 3rd-grade VR launch, 4th-grade independence, and 5th-grade student creation? Helps K-2 and 3-5 teachers understand each other's work and design vertical alignment.", "outcomes": "Teachers leave with a one-page K-5 progression map for one content area, showing how experiential learning in early grades scaffolds VR-based learning in later grades.", "evidence": "Vertical alignment supports learning continuity across grade bands (Schmidt et al., 2011); cross-grade-level professional learning supports teacher coherence."}, "LOW-05": {"id": "LOW-05", "title": "Documentation Practices Across K-5: Capturing What Students Did", "lean": "Pedagogical", "description": "Universal documentation practices \u2014 photos, observation notes, work samples, video clips \u2014 that work whether the learning happened outside, in a Teams chat, or in VR. A shared K-5 documentation routine produces consistency across the building and gives families a coherent picture of their child's growth.", "outcomes": "Teachers leave with a documentation workflow tested in their classroom plus a shared K-5 archive structure proposal.", "evidence": "Reggio-inspired documentation is a well-established practice for making early learning visible (Edwards, Gandini, & Forman, 2012); assessment and documentation support student learning across grade bands (Hattie, 2012)."}, "LOW-06": {"id": "LOW-06", "title": "Differentiating for the Range in Every Lower Classroom", "lean": "Pedagogical", "description": "Every Lower classroom \u2014 K through 5 \u2014 has a range of learners. UDL 3.0 applied across the grade bands. Multiple means of engagement, representation, action; works for experiential K-2 work and VR-active 3rd-5th work alike.", "outcomes": "Teachers leave with a UDL audit of one current unit and three planned variations for student access.", "evidence": "UDL Guidelines 3.0 (CAST, 2024) center learner variability and identity across all ages; applicable to non-tech and tech-mediated instruction equally."}, "K1-01": {"id": "K1-01", "title": "Designing Hands-On, Real-World Experiential Lessons (K-2)", "lean": "Pedagogical", "description": "Real-world experiential learning as the K-2 default: shadow tracing, weather observation, nature walks, outdoor measurement, sensory exploration stations. Designing units where the world is the curriculum and the classroom is where you process what you noticed.", "outcomes": "Teachers leave with one experiential unit plan that uses outdoor or hands-on real-world activities as the primary learning vehicle, with a documentation routine for capturing student observations.", "evidence": "Outdoor and experiential learning produce broad cognitive, physical, and social-emotional benefits in early childhood; a follow-up study found children who spent more time outside in early childhood had better attentional control and academic results 10 years later (Ulset et al., 2023). Outdoor learning is supported by paediatric guidance (Fyfe-Johnson et al., 2021) and a maturing evidence base (Mann et al., 2022; Kuo, Browning & Penner, 2018)."}, "K1-02": {"id": "K1-02", "title": "Embodied Math and Literacy: Learning Through the Body in K-2", "lean": "Pedagogical", "description": "Movement-based, gesture-rich, manipulative-heavy instruction for emergent learners. Walking number lines on the floor, manipulating physical counters, embodied phonics (making letter shapes with your body), gesture and song. The body as a learning tool.", "outcomes": "Teachers leave with one embodied math and one embodied literacy activity tested with their class and refined.", "evidence": "Embodied cognition research shows active manipulation outperforms passive observation for children's conceptual understanding (Lozada & Carro, 2016); early bodily experiences shape lasting cognitive development (Smith, 2005; Educational Psychology Review, 2024)."}, "K1-03": {"id": "K1-03", "title": "Teams and 2D Digital Tools That Earn Their Place in K-2", "lean": "Technical", "description": "Curated 2D digital tools and Teams workflows that actually work for K-2. Which apps support emergent literacy and early math without becoming digital babysitters. Setting up Teams channels that work for very young learners. Knowing when to put the device away.", "outcomes": "Teachers leave with a vetted toolkit of 2-3 K-2-appropriate digital tools, a Teams setup tested with their class, and clear criteria for when a digital tool is the right call vs. when it isn't.", "evidence": "NAEYC guidance on Technology and Interactive Media as Tools in Early Childhood (NAEYC & Fred Rogers Center, 2012; updated 2023) emphasizes intentional, developmentally-appropriate digital tool selection over screen time minimization alone."}, "K1-04": {"id": "K1-04", "title": "Story-Driven Learning in K-2 (Read-Aloud Without VR)", "lean": "Pedagogical", "description": "Narrative as the K-2 instructional spine. Read-aloud routines, dramatic play, story-extension activities, story-circle protocols. Connecting books to real-world experiences students can have themselves.", "outcomes": "Teachers leave with one story-driven thematic unit that connects a picture book to a real-world experiential activity, with a documentation plan.", "evidence": "Read-aloud is foundational K-1 literacy practice (Trelease, 2019); narrative is a primary frame for early childhood learning (Bruner, 1986)."}, "K1-05": {"id": "K1-05", "title": "Routines, Transitions, and Behavior Foundations for Earliest Learners", "lean": "Pedagogical", "description": "Operational foundation for K-2 classrooms \u2014 daily routines, transitions, signals, and behavior supports. Predictable structure as the precondition for everything else that follows.", "outcomes": "Teachers leave with a documented daily routine, transition protocols, and a set of tested classroom signals.", "evidence": "Pyramid Model and other early-childhood behavior supports identify routines and explicit transitions as the foundational tier (Hemmeter et al., 2016); predictability supports behavior regulation in early childhood."}, "K1-06": {"id": "K1-06", "title": "Teacher-Projected VR as a Discussion Artifact (K-2)", "lean": "Pedagogical", "description": "For the occasional case where you want to share what you're seeing in the VR app with your K-2 class on a projector or shared screen. How to frame what students are watching, how to pause for discussion, how to bridge from the projected image back to hands-on experience.", "outcomes": "Teachers leave with one lesson where teacher-projected VR is used as a single discussion artifact (5-10 min max), framed by hands-on experience before and after.", "evidence": "Screen-mediated shared experience can support engagement when accompanied by active adult mediation (Read et al., 2023); teacher mediation is the active ingredient in young children's screen-based learning (NAEYC, 2012/2023)."}, "K1-07": {"id": "K1-07", "title": "AI for K-2 Teacher Workflows (Planning, Differentiation, Feedback)", "lean": "Technical", "description": "Using AI in your own work \u2014 not with students. Differentiating activities for the range in your room, generating leveled materials, drafting parent communications, designing rubrics. Critical evaluation of output is part of the workflow.", "outcomes": "Teachers leave with one AI workflow they will actually use in the next two weeks, plus a checklist for verifying AI output before using it with students.", "evidence": "Aligned to UNESCO AI Competency Framework for Teachers (2024) 'Pedagogy of AI' domain; structured AI use can meaningfully reduce teacher administrative load (UNESCO, 2024)."}, "K1-08": {"id": "K1-08", "title": "Family Communication in K-2: Building Trust Around School Experiences", "lean": "Pedagogical", "description": "K-2 is many families' first sustained relationship with their child's school. Communication patterns that build trust: weekly photos with context, take-home documentation of experiential learning, conferences that center the child's growth, addressing concerns about screen time and digital tools.", "outcomes": "Teachers leave with a documented family communication routine (weekly cadence, format, content) plus a one-page handout explaining the K-2 experiential approach for parent night.", "evidence": "Family-school communication is a documented mediator of student outcomes (Henderson & Mapp, 2002); early grades are when family relationships with the school form."}, "G23-01": {"id": "G23-01", "title": "Experiential and Hands-On Learning for K-2 (Extension)", "lean": "Pedagogical", "description": "Building on the K-2 experiential learning baseline (K1-01) with more student-led inquiry. Outdoor science investigations, community-based learning, hands-on math manipulatives, science observation routines that 1st and 2nd graders can lead more independently.", "outcomes": "Teachers leave with one inquiry-based experiential unit designed for late-K-2, with explicit student-led data collection or observation.", "evidence": "Outdoor and place-based learning shows sustained cognitive and academic benefits across early elementary (Kuo, Browning & Penner, 2018; Mann et al., 2022); inquiry is developmentally appropriate at this stage."}, "G23-02": {"id": "G23-02", "title": "Building Reading Comprehension Through Concrete Experience (K-2)", "lean": "Pedagogical", "description": "Prior knowledge is the strongest predictor of reading comprehension. For 1st and 2nd graders, build that prior knowledge through real-world experience (a visit, an activity, an observation) before reading texts about it. The bridge from learning-to-read to reading-to-learn.", "outcomes": "Teachers leave with one comprehension unit where a concrete experience scaffolds the reading that follows.", "evidence": "Prior knowledge is the single strongest predictor of reading comprehension (Recht & Leslie, 1988); concrete experiences build schema efficiently (Willingham, 2017)."}, "G23-03": {"id": "G23-03", "title": "Embodied and Manipulative-Based Math for K-2 (Extension)", "lean": "Pedagogical", "description": "Building on early embodied math (K1-02) with the Concrete-Representational-Abstract progression. Place value blocks, fraction circles, geometric solids, embodied number lines \u2014 extensive time in the concrete phase before moving to symbolic math. Particularly important for 1st and 2nd grade math foundations.", "outcomes": "Teachers leave with one math unit that maps the CRA progression for a specific concept, with planned concrete and representational stages.", "evidence": "CRA progression is established math pedagogy with strong evidence for elementary (Witzel et al., 2008); embodied cognition supports early math (Lakoff & N\u00fa\u00f1ez, 2000; Lozada & Carro, 2016)."}, "G23-04": {"id": "G23-04", "title": "Teacher-Projected VR for Class Discussion (K-2)", "lean": "Pedagogical", "description": "Teacher uses the VR app on a shared screen as a discussion artifact for K-2. How to frame what students see, when to pause, how to pull conversation away from 'wow' and toward content. Useful for the occasional all-class VR experience without students wearing headsets. (Note: K1-06 covers the same topic \u2014 pick whichever framing better fits your team.)", "outcomes": "Teachers leave with one lesson that uses teacher-projected VR as a discussion anchor, with pause points and discussion prompts mapped.", "evidence": "Screen-mediated shared experience supports learning when accompanied by active adult mediation (Read et al., 2023); teacher framing is what makes screen-based content educational (NAEYC, 2012/2023)."}, "G23-05": {"id": "G23-05", "title": "Preparing 3rd Grade for Q3 VR Launch (3-5 Group)", "lean": "Pedagogical", "description": "For the 3-5 group: 3rd grade students start wearing headsets at the beginning of Q3 (Cycle 2). This topic covers the full preparation arc \u2014 Q1-Q2 routines and pre-VR exposure for 3rd graders, the Q3 onboarding sequence, supporting students who find it overwhelming, and first lessons that build comfort before content. Best timed for late Q1 or early Q2 Subject Live so 3rd-grade teachers have lead time before the January launch.", "outcomes": "Teachers leave with a 3rd-grade VR readiness plan: pre-launch classroom routines, Q3 onboarding sequence, first 3 student-in-headset lessons designed for comfort over content, and a parent communication plan for the transition.", "evidence": "Routines support behavior regulation across transitions (Hemmeter et al., 2016); introducing immersive media to children benefits from staged exposure and adult scaffolding (NAEYC, 2012/2023)."}, "G23-06": {"id": "G23-06", "title": "Cross-Subject Thematic Design for K-2", "lean": "Blended", "description": "Multi-subject elementary teaching is the norm. Designing thematic 2-week units where reading, math, science, and social studies all sit inside one anchoring experience or place. Reduces setup burden, deepens connections. Particularly powerful in K-2 where one teacher typically owns all subjects.", "outcomes": "Teachers leave with one thematic unit mapped across at least three subjects, anchored by a single shared experience.", "evidence": "Thematic integration is well-supported in elementary curriculum design (Drake & Reid, 2018); multi-subject elementary teaching benefits from shared infrastructure."}, "G23-07": {"id": "G23-07", "title": "Age-Appropriate Student Agency in K-2", "lean": "Pedagogical", "description": "Bounded choice for early learners. Three decision points, not thirty. Designing tasks where students choose within constraints \u2014 building agency and executive function without overwhelm. Applies across all K-2 subjects regardless of tech use.", "outcomes": "Teachers leave with one redesigned lesson that includes three meaningful student decision points and explicit scaffolding for the choices.", "evidence": "Bounded choice supports developing executive function (Diamond, 2013); self-determination supports motivation across grade bands (Ryan & Deci, 2020)."}, "G23-08": {"id": "G23-08", "title": "AI for K-2 Teacher Workflows \u2014 Extension (Differentiation, Feedback, Communication)", "lean": "Technical", "description": "Builds on K1-07 (foundational K-2 AI workflows). Goes deeper into specific use cases: differentiating for the wide range of readiness in a K-2 room, generating leveled materials and word lists, drafting family communications, designing rubrics for K-2 work. Critical evaluation before any AI output reaches a child.", "outcomes": "Teachers leave with one extended AI workflow they will use in the next two weeks (separate from the one developed in K1-07) plus a verification checklist.", "evidence": "Aligned to UNESCO AI Competency Framework for Teachers (2024) 'Pedagogy of AI' domain; AI is most defensible in teacher workflow rather than direct student use at this age (NAEYC, 2012/2023)."}, "K2-01": {"id": "K2-01", "title": "Spalding Method: Refresher for K-2 Teachers", "lean": "Pedagogical", "description": "Refresher session led by a teacher who has completed Spalding training, supporting K-2 teachers who haven't yet completed the full course. Covers the phonogram system, marking notation, the multisensory presentation cycle, and the daily Spalding routine. Designed as a working session \u2014 teachers practice the method during the PD time.", "outcomes": "Teachers leave able to deliver a Spalding daily routine to their K-2 classroom plus a peer-practice partnership with another teacher for the following week.", "evidence": "The Spalding Method (Writing Road to Reading) is an evidence-based, explicit, systematic, multisensory phonics approach incorporating the five pillars of effective reading instruction identified by the National Reading Panel: phonemic awareness, phonics, vocabulary, fluency, and comprehension (Spalding Education International; National Reading Panel, 2000). Adapted from Orton-Gillingham, accredited by IMSLEC."}, "K2-02": {"id": "K2-02", "title": "Spalding Phonogram Instruction: Going Deeper", "lean": "Pedagogical", "description": "Beyond the basics. Working with the 70 Spalding phonograms in classroom rotation, trouble-shooting common student difficulties, integrating phonograms across spelling, writing, and reading. For K-2 teachers comfortable with the basics who want to extend their fluency.", "outcomes": "Teachers leave with a phonogram-introduction sequence customized to their classroom and a troubleshooting reference for the 10 most commonly confused phonograms.", "evidence": "Multisensory phonics instruction has strong evidence for K-2 reading outcomes (National Reading Panel, 2000; LDOnline, 2023); Spalding's structured approach is particularly effective for diverse learners including English learners and students with learning disabilities."}, "K2-03": {"id": "K2-03", "title": "Integrating Spalding with Real-World Experiential Learning", "lean": "Blended", "description": "Bringing Spalding into the experiential K-2 learning model. Using outdoor and hands-on activities as the context for phonogram work, embedding spelling and writing into the documentation of real-world experiences. Spalding plus shadow tracing, science observations, nature walks.", "outcomes": "Teachers leave with one unit that integrates a Spalding lesson sequence with a hands-on experiential anchor activity.", "evidence": "Multisensory phonics combined with rich contextual experience supports vocabulary and comprehension development (Beck, McKeown, & Kucan, 2013); Spalding's integration with writing and meaningful context aligns with Science of Reading research."}, "K2-04": {"id": "K2-04", "title": "New K-2 Teacher Onboarding (Q1) \u2014 Canvas, Teams, and Classroom Routines", "lean": "Technical", "description": "For Q1 use with newly hired K and 1st grade teachers. Canvas course setup, assignment creation, parent communication via Teams, classroom routine establishment, daily schedule, supplies and materials, OptimaED procedures. Designed to run weekly during Q1 alongside the regular New Teachers (VR-focused) track that 3-5+ new hires attend.", "outcomes": "Teachers leave each week with a specific competency: Canvas course built, Teams channels configured, first parent newsletter sent, daily routine documented, etc.", "evidence": "New teacher mentoring with structured onboarding shows strong effects on teacher retention and effectiveness (Ingersoll & Strong, 2011); separate K-2 onboarding respects developmental and operational differences from upper grades."}, "K2-05": {"id": "K2-05", "title": "Classical Conversation and Faculty VR Experiences for K-2 Teachers", "lean": "Pedagogical", "description": "Even though K-2 teachers don't use VR with students, they should still be able to participate as adult learners in faculty VR experiences \u2014 joining a professional development session, attending a faculty meeting in VR, sitting around a campfire for a classical conversation. Maintains their connection to the school's spatial-computing identity.", "outcomes": "Teachers leave with VR comfort: able to navigate the app, attend a meeting, join a conversation, and articulate the difference between teacher VR experience and student VR pedagogy.", "evidence": "Adult immersive learning experiences support faculty community and identity in spatial-computing schools; even non-teaching VR exposure builds shared vocabulary and lowers the threshold for occasional teacher-projected VR use (NAEYC, 2012/2023)."}, "G4-01": {"id": "G4-01", "title": "Place-Based Social Studies in VR for 4th Grade", "lean": "Blended", "description": "4th grade typically covers state history and US geography. VR field trips to Florida ecosystems, historical sites, and physical features \u2014 with embedded inquiry tasks rather than sightseeing.", "outcomes": "Teachers leave with one place-based 4th grade social studies unit with inquiry tasks tied to learning standards.", "evidence": "Place-based education supports civic and historical thinking (Sobel, 2004); Wineburg's historical thinking framework adapted for upper elementary."}, "G4-02": {"id": "G4-02", "title": "Fractions and Geometry in Spatial Environments (4th)", "lean": "Blended", "description": "4th grade math leans heavily on fractions and geometric reasoning. VR's spatial affordances are exceptional for these \u2014 manipulating fraction models, exploring 2D and 3D shapes, walking through angle and area concepts.", "outcomes": "Teachers leave with one fractions or geometry lesson redesigned for spatial manipulation.", "evidence": "Spatial reasoning correlates strongly with later mathematical achievement (Newcombe & Shipley, 2015); 4th grade is a critical developmental window for geometric thinking."}, "G4-03": {"id": "G4-03", "title": "Introducing Source Work to 4th Graders in Spatial Space", "lean": "Pedagogical", "description": "Age-appropriate primary source work. Students examine artifacts, documents, and images in 3D context \u2014 starting to ask 'who made this, when, and why.' Building the historical thinking habit early.", "outcomes": "Teachers leave with one source-based 4th grade lesson plus an age-appropriate scaffold for student questioning.", "evidence": "Historical thinking can be developed in upper elementary (Levstik & Barton, 2015); Stanford History Education Group's elementary resources support this."}, "G4-04": {"id": "G4-04", "title": "Scientific Inquiry and Modeling in VR (4th)", "lean": "Blended", "description": "4th grade science (ecosystems, energy, weather) maps well to VR modeling and scale shifts. Designing lessons where students observe, manipulate, and explain rather than passively view.", "outcomes": "Teachers leave with one inquiry-based 4th grade science lesson with VR-as-investigation-tool.", "evidence": "NGSS practices emphasize student inquiry over content delivery (NRC, 2012); VR's manipulability supports the 'developing and using models' practice."}, "G5-01": {"id": "G5-01", "title": "Argumentation and Evidence in 5th Grade ELA", "lean": "Pedagogical", "description": "5th graders are ready for evidence-based argument. Using VR environments to ground argumentation \u2014 students argue from specific spatial evidence they examined. Bridges to middle school writing demands.", "outcomes": "Teachers leave with one argumentation unit anchored in VR-based source material.", "evidence": "Argumentation is a Common Core writing demand starting in upper elementary; evidence-based reasoning is supported by concrete, examinable sources (Hillocks, 2010)."}, "G5-02": {"id": "G5-02", "title": "Pre-Algebraic Thinking and Modeling in Spatial Space (5th)", "lean": "Blended", "description": "5th grade math bridges into pre-algebraic thinking \u2014 variables, expressions, patterns. VR's ability to model relationships dynamically can make abstraction more concrete during this critical transition.", "outcomes": "Teachers leave with one pre-algebra lesson using dynamic spatial models.", "evidence": "Dynamic representation supports algebraic thinking (Kaput, 1995); CAMIL's embodiment factor supports abstract math learning."}, "G5-03": {"id": "G5-03", "title": "Student-Created VR Artifacts as Capstone Projects (5th)", "lean": "Technical", "description": "5th grade has the developmental readiness to be creators, not just consumers, in VR. Building, annotating, and presenting student-built artifacts as capstone work that bridges to middle school project demands.", "outcomes": "Teachers leave with one project unit where students build and present a VR artifact aligned to a learning standard.", "evidence": "Maker-centered VR research (Caratachea & Jones, 2024) shows that student creation builds deeper engagement; project-based learning is well-supported in upper elementary (Larmer et al., 2015)."}, "G5-04": {"id": "G5-04", "title": "Building 5th-to-6th Bridge Routines", "lean": "Pedagogical", "description": "End-of-elementary work that prepares students for middle school's looser structure. Self-regulation, longer-form work, multi-step projects \u2014 using VR settings to scaffold these transitions.", "outcomes": "Teachers leave with one transition-focused unit and a set of routines that build student self-management.", "evidence": "Self-regulated learning is a major predictor of middle-school success (Wolters, 2011); explicit teaching of SRL strategies pays off across the transition."}, "AL-01": {"id": "AL-01", "title": "Spatial Art-Making for Elementary Students", "lean": "Technical", "description": "VR as a studio for elementary students \u2014 3D drawing, sculpting, environment design \u2014 at developmentally appropriate complexity. Tool selection, scaffolding, and assessment of art-making process.", "outcomes": "Teachers leave with one art-making unit using VR creation tools at the appropriate developmental level.", "evidence": "Process-focused art assessment is established practice (Hetland et al., 2013); maker-centered VR supports creative production (Caratachea & Jones, 2024)."}, "AL-02": {"id": "AL-02", "title": "World Language Immersion for Young Learners", "lean": "Pedagogical", "description": "Using VR's presence affordance to expose young learners to second language in context. Low-stakes, repeated exposure to vocabulary in setting; reducing affective filter through play.", "outcomes": "Teachers leave with one VR-immersion language activity plus an assessment of student L2 vocabulary acquisition before and after.", "evidence": "L2 acquisition benefits from low-anxiety, contextually-rich input (Krashen, 1985); K-12 L2 VR research shows consistent vocabulary gains (Ye et al., 2024)."}, "AL-03": {"id": "AL-03", "title": "Performance and Voice in Lower Elementary Art & Language", "lean": "Pedagogical", "description": "Performance work \u2014 reader's theater, dramatic interpretation, public speaking rehearsal \u2014 in VR. Lower-stakes, repeatable, and observable.", "outcomes": "Teachers leave with one performance-based art or language unit using VR for low-stakes rehearsal.", "evidence": "Performance reduces affective barriers to expressive language work (Wagner, 1998); VR's presence affordance supports rehearsal and feedback."}, "AL-04": {"id": "AL-04", "title": "Cross-Cultural Exploration in VR for Elementary Students", "lean": "Pedagogical", "description": "Visiting other places and cultural contexts through VR \u2014 not as tourism, but as a way to build appreciation and informed perspective. Includes critical consideration of whose perspective the VR experience represents.", "outcomes": "Teachers leave with one cross-cultural unit plus a reflection protocol on perspective and representation.", "evidence": "Culturally responsive teaching supports learning across diverse populations (Gay, 2018); UDL 3.0 (CAST, 2024) centers identity and representation."}, "AS-01": {"id": "AS-01", "title": "Advanced Environment Design in VR \u2014 Year Over Year", "lean": "Technical", "description": "Elevate the same environment year after year. Custom lighting, atmosphere, pedagogical purpose. Teachers who've been using the same space for two years need method, not just motivation.", "outcomes": "Async module with prompts to rebuild one core environment and document the changes for next year's iteration.", "evidence": "Same evidence as VR-T01."}, "AS-02": {"id": "AS-02", "title": "3D Asset Creation with Blender \u2014 Foundations", "lean": "Technical", "description": "Self-paced introduction to Blender. Mesh editing, exporting, basic materials.", "outcomes": "Async module with one custom asset built by completion.", "evidence": "Same evidence as VR-T02."}, "AS-03": {"id": "AS-03", "title": "3D Asset Creation with Blender \u2014 Optimization & Import", "lean": "Technical", "description": "Follow-on async module: optimization, import workflows, troubleshooting.", "outcomes": "Async module with one optimized custom asset placed into a VR scene.", "evidence": "Same evidence as VR-T03."}, "AS-04": {"id": "AS-04", "title": "Building Interactive Lessons: IFX, Logic, and Branching", "lean": "Technical", "description": "Self-paced module on interactive features, triggers, and student choice in VR lessons.", "outcomes": "Async module with one branching lesson built.", "evidence": "Same evidence as VR-T04."}, "AS-05": {"id": "AS-05", "title": "VR Assessment Design", "lean": "Pedagogical", "description": "Capturing artifacts, designing rubrics for spatial work, using VR-native outputs as evidence of learning.", "outcomes": "Async module with one rubric draft and an artifact-collection plan.", "evidence": "Same evidence as VR-P01."}, "AS-06": {"id": "AS-06", "title": "Desktop and Hybrid Delivery in VR", "lean": "Blended", "description": "Running VR lessons when not every student has a headset.", "outcomes": "Async module with one lesson redesigned for hybrid delivery.", "evidence": "Same evidence as VR-T05."}, "AS-07": {"id": "AS-07", "title": "AI for Lesson Planning and Differentiation", "lean": "Technical", "description": "Structured AI workflows for differentiated assignment generation.", "outcomes": "Async module with three differentiated versions of one assignment.", "evidence": "Same evidence as AI-T01."}, "AS-08": {"id": "AS-08", "title": "AI for Formative Assessment and Feedback", "lean": "Blended", "description": "AI-assisted formative assessment design with verification practices.", "outcomes": "Async module with one formative workflow and verification checklist.", "evidence": "Same evidence as AI-T02."}, "AS-09": {"id": "AS-09", "title": "Spatial Computing + AI Integration", "lean": "Technical", "description": "Where VR and AI meet: AI for in-VR experience design, in-world AI characters used pedagogically, AI-generated 3D-ready content.", "outcomes": "Async module with one VR lesson that meaningfully uses AI.", "evidence": "Same evidence as AI-T04."}, "AS-10": {"id": "AS-10", "title": "Universal Design for Learning in a Spatial Computing School", "lean": "Pedagogical", "description": "UDL 3.0 applied to VR. Multiple means of engagement, representation, action.", "outcomes": "Async module with a UDL audit of one VR unit and three planned variations.", "evidence": "Same evidence as VR-P03."}, "AS-11": {"id": "AS-11", "title": "Technology Integration Frameworks: SAMR, TPACK, PICRAT", "lean": "Pedagogical", "description": "Three frameworks for articulating why a tech choice is the right one.", "outcomes": "Async module with one lesson evaluated and revised using one framework.", "evidence": "Same evidence as VR-P04."}, "AS-12": {"id": "AS-12", "title": "Conducting Classroom Research to Back Your Decisions", "lean": "Pedagogical", "description": "Action research cycle for teachers \u2014 lightweight, data-informed, classroom-grounded.", "outcomes": "Async module with a one-page action research plan.", "evidence": "Same evidence as VR-P05."}, "AS-13": {"id": "AS-13", "title": "Content-Specific Pedagogy in Virtual Space", "lean": "Pedagogical", "description": "What does good subject-area pedagogy look like in spatial environments? Subject-specific affordances and design moves.", "outcomes": "Async module with a subject-specific 'what works / what doesn't' map.", "evidence": "Same evidence as VR-P06."}, "AS-14": {"id": "AS-14", "title": "Designing for Student Agency in VR", "lean": "Blended", "description": "Environment design + choice theory. Student decision points, not guided tours.", "outcomes": "Async module with one lesson redesigned for student agency.", "evidence": "Same evidence as VR-P02."}, "AS-15": {"id": "AS-15", "title": "Ethical AI Use: A Classroom Framework", "lean": "Pedagogical", "description": "Beyond compliance \u2014 modeling, assignment design, student conversations.", "outcomes": "Async module with a one-page AI policy and one redesigned assignment.", "evidence": "Same evidence as AI-P01."}, "AS-16": {"id": "AS-16", "title": "Classroom Management in Immersive Environments", "lean": "Pedagogical", "description": "What changes about classroom management when half your students are in headsets? Transitions, off-task behavior, time management, signals and cues, and the physical logistics of headset use across a class period. Builds the operational baseline that makes pedagogy possible.", "outcomes": "Async module with a documented daily VR routine, a transition protocol, and a tested set of in-headset signals (e.g., 'thumbs up means I can hear you').", "evidence": "Routines and transitions are foundational classroom management practices in K-12 (Hemmeter et al., 2016; Lemov, 2021); VR adds physical and attentional complexity that benefits from explicit routine design."}, "AS-17": {"id": "AS-17", "title": "Communicating with Families About VR and AI", "lean": "Pedagogical", "description": "Templates and talking points for parent-night, syllabus, conference, and individual-concern conversations about VR and AI in the classroom. Includes how to respond to the most common concerns: screen time, headset safety, AI cheating, data privacy.", "outcomes": "Async module producing a one-page family communication packet for the teacher's grade band, plus a set of email templates for common parent questions.", "evidence": "Family-school communication is a documented mediator of student outcomes (Henderson & Mapp, 2002, A New Wave of Evidence); proactive communication around new technologies reduces friction and increases family trust."}, "AS-18": {"id": "AS-18", "title": "VR for Neurodivergent Learners: Design Moves That Work", "lean": "Pedagogical", "description": "VR can be exceptional for some neurodivergent students (controllable sensory environments, low-stakes social rehearsal, calm spaces) and difficult for others (sensory overload, motion sensitivity). Design moves and accommodations grounded in current research.", "outcomes": "Async module producing a personal 'design moves' reference sheet for the teacher's current students with IEPs/504s/identified sensory needs.", "evidence": "VR for ASD/ADHD learners shows promising effects when sensory parameters are controllable (Ide-Okochi et al., 2022; ClassVR neuroempathy work, 2026); UDL Guidelines 3.0 (CAST, 2024) provide the design framework."}, "AS-19": {"id": "AS-19", "title": "Teaching Students Prompting Literacy", "lean": "Pedagogical", "description": "Prompting literacy as a student-facing skill, not just a teacher workflow. How to teach iterative refinement, evaluation of AI output, and ethical considerations \u2014 by grade band. Includes sample lesson sequences.", "outcomes": "Async module producing one student-facing prompting literacy lesson sequence appropriate for the teacher's grade band.", "evidence": "Prompt engineering is increasingly framed as a 21st-century K-12 literacy (emerging curriculum frameworks, 2025); AILit Framework (OECD/EC, 2025) names 'Create with AI' as a core student competency."}, "AS-20": {"id": "AS-20", "title": "AI Output Evaluation: Teaching Students to Critique What AI Gives Them", "lean": "Pedagogical", "description": "Beyond 'check AI for accuracy.' Structured protocols for students to evaluate AI responses across dimensions: factual accuracy, source plausibility, bias, completeness, tone, and missing perspectives. Builds the critical evaluation muscle the AILit Framework calls 'Manage AI.'", "outcomes": "Async module producing one evaluation protocol customized to the teacher's content area and a student-facing rubric for evaluating AI output.", "evidence": "AILit 'Manage AI' competency (OECD/EC, 2025) and UNESCO student AI competency framework (2024) both center critical evaluation as foundational; current research shows uncritical AI acceptance is a major K-12 risk."}, "AS-21": {"id": "AS-21", "title": "Student Data Privacy in AI Tools", "lean": "Pedagogical", "description": "What data are AI tools collecting? What goes in the prompt is not private. Practical patterns for protecting student information: anonymization, what to never paste, how to evaluate a new AI tool's data practices, and how to talk to students about their own AI data hygiene.", "outcomes": "Async module producing a personal 'AI data hygiene' checklist and a one-page guide for students on what to never share with AI tools.", "evidence": "Student data privacy is named as a foundational concern in UNESCO AI Competency Framework for Teachers (2024) and AILit (OECD/EC, 2025); FERPA-aligned practice is increasingly being adapted for generative AI contexts."}, "AS-22": {"id": "AS-22", "title": "Multimodal Student Creation in VR: Beyond Consumption", "lean": "Technical", "description": "Move students from VR consumers to VR creators. Tools and design patterns for students building artifacts in spatial space \u2014 scenes, sculptures, performances, annotated environments \u2014 as evidence of learning.", "outcomes": "Async module producing one creation-focused assignment (vs. consumption-focused) with a workflow for students to build, save, and share their work.", "evidence": "Maker-centered VR research (Caratachea & Jones, 2024) shows that student creation produces deeper engagement than consumption; aligns with CAMIL agency affordance (Makransky & Petersen, 2021)."}, "AS-23": {"id": "AS-23", "title": "Co-Teaching and Collaboration in Spatial Environments", "lean": "Pedagogical", "description": "Two teachers, one VR space \u2014 or co-leading a VR lesson with a colleague who isn't physically present. Roles, communication, signal protocols, and the design of lessons that take advantage of two facilitators rather than just doubling up.", "outcomes": "Async module producing a co-teaching protocol and one lesson explicitly designed for two-teacher facilitation in VR.", "evidence": "Co-teaching research (Friend & Cook, 2017) identifies six configurations; spatial environments add a 'parallel virtual presence' configuration that's underexplored but high-leverage for inclusive instruction."}, "AS-24": {"id": "AS-24", "title": "Auditing Your Own VR Practice: A Self-Review Module", "lean": "Pedagogical", "description": "A structured self-audit teachers run on their own VR lessons. Uses CAMIL, UDL 3.0, and PICRAT as audit lenses. Identifies which lessons leverage VR's distinctive affordances and which are essentially flat-screen lessons wearing a headset.", "outcomes": "Async module producing a completed audit of three of the teacher's existing VR lessons and a prioritized revision list.", "evidence": "Self-audit frameworks build reflective practice (Sch\u00f6n, 1984; Brookfield, 2017); structured rubrics outperform open reflection (Brookfield)."}, "AS-25": {"id": "AS-25", "title": "Multimodal Storytelling: VR + Audio + Text", "lean": "Blended", "description": "Designing units where students tell a story across modalities \u2014 a VR scene, a voice-over, a written artifact. Uses VR's presence affordance for the moments it fits and lets each modality do what it does best.", "outcomes": "Async module producing one multimodal storytelling unit with at least three distinct media integrated around one student goal.", "evidence": "Multimodal composition is a well-established framework in literacy education (New London Group, 1996; Cope & Kalantzis, 2020); UDL 3.0 (CAST, 2024) Multiple Means of Action & Expression directly supports cross-modal student work."}, "AS-26": {"id": "AS-26", "title": "Reflective Practice for Teachers: Building a Personal Practice", "lean": "Pedagogical", "description": "A sustainable reflection routine \u2014 not yearly, not weekly, but built into the rhythm of teaching. Journaling prompts, debrief protocols for after VR lessons, and lightweight artifact-keeping that pays off over a full year.", "outcomes": "Async module producing the teacher's own reflection routine, tested for at least two weeks during the module, with notes on what fit and what didn't.", "evidence": "Reflective practice produces stronger transfer when structured and routine (Sch\u00f6n, 1984; Brookfield, 2017); journaling and structured debriefs are durable vehicles."}, "AS-27": {"id": "AS-27", "title": "Lesson Library Hygiene: Organizing What You've Built", "lean": "Technical", "description": "Practical file management for spatial computing teachers. Naming conventions for VR scenes and assets, archive structure in OneDrive, version control for lessons you revise year over year, and how to make next year's planning faster.", "outcomes": "Async module producing the teacher's reorganized lesson library with a documented naming and versioning convention.", "evidence": "Knowledge management is a real but under-discussed teacher skill; lesson study research (Lewis et al., 2006) emphasizes that lasting practice depends on infrastructure for capturing and revising work."}, "AS-28": {"id": "AS-28", "title": "When VR Is the Wrong Tool: A Design Decision Module", "lean": "Pedagogical", "description": "Naming the cases where VR is genuinely not the right tool \u2014 and what is. Decision criteria, content-area examples, and explicit permission to use flat tools where they win. Counter to the implicit pressure to use VR every time.", "outcomes": "Async module producing a personal 'when not to VR' decision rubric for the teacher's content area, with at least three current lessons re-examined.", "evidence": "Right-tool reasoning aligns with PICRAT (Kimmons et al., 2020) and TPACK (Mishra & Koehler, 2006); explicit attention to when not to use a technology is as important as when to use it."}, "AS-29": {"id": "AS-29", "title": "AI for Administrative Workload Reduction", "lean": "Technical", "description": "Practical AI workflows for the unglamorous half of teaching: parent email drafts, rubric generation, schedule coordination, meeting note summarization, IEP documentation support. Reduces the cognitive overhead that keeps teachers from their pedagogical work.", "outcomes": "Async module producing a personal AI workflow for at least three recurring administrative tasks, with time-saved estimates.", "evidence": "Teacher workload reduction is one of the highest-leverage applications of AI in K-12 according to UNESCO AI Competency Framework (2024); time freed up reinvests in instruction."}, "AS-30": {"id": "AS-30", "title": "Bringing Returning Teachers Up to Speed on a New VR Platform", "lean": "Technical", "description": "If OptimaEd switches VR platforms mid-year, returning teachers need an efficient way to rebuild their fluency. This module gives them the platform-agnostic mental models and the specific platform-transition checklist to be productive fast. Covers feature mapping, asset migration, and 'translating' your existing lessons.", "outcomes": "Async module producing a feature-mapping document between the old and new platform plus one fully migrated lesson.", "evidence": "Transfer-of-learning research (Perkins & Salomon, 1992) supports explicit feature-mapping and analogical reasoning when learners move between similar tools; reduces the typical platform-switch productivity drop."}, "AS-31": {"id": "AS-31", "title": "Spalding Refresher (Self-Paced)", "lean": "Pedagogical", "description": "Self-paced refresher on the Spalding Method for K-2 teachers. Phonogram review, marking notation practice, daily routine reminders, video examples of classroom implementation, and self-check exercises. Pairs well with K2-01 / K2-02 live sessions but can stand alone.", "outcomes": "Async module producing a personal Spalding pacing plan for the next quarter and self-assessment of phonogram fluency.", "evidence": "Same evidence as K2-01 (Spalding Education International; National Reading Panel, 2000)."}, "AS-32": {"id": "AS-32", "title": "Hands-On Experiential Learning Library for K-2", "lean": "Pedagogical", "description": "A bank of vetted, classroom-tested experiential activities for K-2 organized by season, content area, and outdoor/indoor. Shadow tracing, weather observation, nature scavenger hunts, sensory exploration stations, simple science experiments. Each activity includes setup, materials list, learning objectives, and documentation suggestions.", "outcomes": "Async module where teachers select 3 activities to try, plan their integration into the next 2 weeks, and report back via Module Share.", "evidence": "Outdoor and experiential learning produce broad cognitive and academic benefits in early childhood (Ulset et al., 2023; Mann et al., 2022)."}, "AS-33": {"id": "AS-33", "title": "Teams Workflows for K-2 Classrooms", "lean": "Technical", "description": "Self-paced module on Teams workflows that actually work in K-2: assignments configuration, parent communication channels, file sharing, OneNote class notebooks for non-readers, voice notes, simple polls. Less tech, more right tech.", "outcomes": "Async module producing a documented Teams setup for the teacher's K-2 classroom.", "evidence": "NAEYC guidance on developmentally-appropriate technology use (NAEYC & Fred Rogers Center, 2012/2023); intentional tool selection over screen time minimization alone."}};

function cloneForFirestore(value) {
  return JSON.parse(JSON.stringify(value));
}

function replaceObjectContents(target, source) {
  Object.keys(target).forEach(key => delete target[key]);
  Object.assign(target, cloneForFirestore(source || {}));
}

function replaceArrayContents(target, source) {
  target.splice(0, target.length, ...cloneForFirestore(source || []));
}

function setLoadingMessage(message, detail) {
  const c = document.getElementById('main-content');
  if (!c) return;
  const detailHtml = detail
    ? '<pre style="white-space:pre-wrap;margin-top:10px;padding:12px;background:rgba(0,0,0,.25);border:1px solid var(--card-border);border-radius:6px;color:var(--label);font-size:11px;line-height:1.45;max-width:900px">' + esc(detail) + '</pre>'
    : '';
  c.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:20px">' + esc(message) + detailHtml + '</div>';
}

function firebaseErrorDetail(err) {
  if (!err) return 'No technical error was provided.';
  return [
    'Code: ' + (err.code || '(no code)'),
    'Message: ' + (err.message || String(err)),
    '',
    'Most common causes:',
    '1. Firestore database has not been created yet in the Firebase console.',
    '2. Firestore rules are blocking this browser. For first testing, use temporary test rules.',
    '3. This browser/network is blocking Firebase requests. This version forces Firestore long polling to help with that.'
  ].join('\n');
}

async function seedFirestoreIfEmpty() {
  const snap = await stateRef.get();
  const data = snap.exists ? snap.data() : null;
  const isEmpty = !data || !data.topics || Object.keys(data.topics || {}).length === 0;

  if (isEmpty) {
    await stateRef.set({
      topics: DEFAULT_TOPICS,
      schedule: DEFAULT_SCHEDULE,
      topicGroups: DEFAULT_TOPIC_GROUPS,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
}

function applyRemoteState(data) {
  if (!data) return;
  isApplyingRemoteState = true;
  replaceObjectContents(topics, data.topics || {});
  replaceArrayContents(schedule, data.schedule || []);
  replaceObjectContents(topicGroups, data.topicGroups || {});
  isApplyingRemoteState = false;
  hasLoadedRemoteState = true;
  renderRefGroups();
  render();
}

function startFirestoreListener() {
  return stateRef.onSnapshot(
    snap => {
      if (!snap.exists) return;
      applyRemoteState(snap.data());
    },
    err => {
      console.error('Firestore listener error:', err);
      setLoadingMessage('Could not connect to Firestore. Check your Firebase config and Firestore rules.', firebaseErrorDetail(err));
    }
  );
}

async function saveAllData() {
  if (isApplyingRemoteState) return;
  if (!auth.currentUser) {
    alert('Please sign in with Microsoft before making changes.');
    renderAuthGate();
    return;
  }
  try {
    // IMPORTANT: Do not use { merge: true } here.
    // This app stores the whole shared state in one Firestore document.
    // Using merge preserves deleted nested map keys, which means deleted topics/groups can reappear.
    // A full set overwrites topics, schedule, and topicGroups so deletes and prefix renames persist correctly.
    await stateRef.set({
      topics: cloneForFirestore(topics),
      schedule: cloneForFirestore(schedule),
      topicGroups: cloneForFirestore(topicGroups),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy: {
        uid: auth.currentUser.uid,
        email: auth.currentUser.email || '',
        displayName: auth.currentUser.displayName || ''
      }
    });
  } catch (err) {
    console.error('Firestore save failed:', err);
    alert('Your change was made on this page, but it did not save to Firestore. ' + (err.message || 'Check your internet connection, Firebase config, and Firestore rules.'));
  }
}

function saveScheduleChange() {

  }
}


// Evidence citations — deduplicated from topic records
function buildEvidenceMap() {
  const map = {}; // citation text → Set of topic IDs
  Object.values(topics).forEach(t => {
    if (!t.evidence) return;
    // Split on semicolons or newlines for multiple citations
    const parts = t.evidence.split(/;\s*(?=[A-Z])/);
    parts.forEach(raw => {
      const cite = raw.trim();
      if (!cite) return;
      if (!map[cite]) map[cite] = new Set();
      map[cite].add(t.id);
    });
  });
  return map;
}

function topicFmt(id) {
  if (!id) return 'live';
  // Match longest prefix first
  const sorted = Object.keys(topicGroups).sort((a,b)=>b.length-a.length);
  for (const pfx of sorted) {
    if (id.startsWith(pfx)) return topicGroups[pfx].fmt;
  }
  return 'live';
}
function getFormat(stype, school) {
  if (!stype) return 'live';
  const s = stype.toLowerCase();
  if (school) {
    const sc = school.toLowerCase();
    if (sc.includes('new k-2')||sc.includes('new k2')) return 'k2ob';
    if (sc.includes('new ')) return 'newt';
  }
  if (s.includes('k-2 onboarding')||s.includes('k2 onboarding')) return 'k2ob';
  if (s.includes('subject live')||s.includes('content-specific')) return 'subject';
  if (s.includes('async')) return 'async';
  if (s.includes('showcase')||s.includes('party')||s.includes('closeout')||s.includes('★')) return 'special';
  if (s.includes('no pd')||s.includes('conference')) return 'nopd';
  if (s.includes('live')) return 'live';
  return 'live';
}

function topicTagHtml(id, draggable, fromSlotIdx) {
  const t = topics[id];
  if (!t) return '<span class="topic-tag" style="opacity:.5">'+id+'</span>';
  const uses = getTopicUsage(id);
  let dot = '';
  if (uses.length > 0) {
    const so = {'Planning':0,'In Build':1,'Review':2,'Ready':3,'Delivered':4};
    const best = uses.reduce((a,b)=>(so[a.status]||0)>=(so[b.status]||0)?a:b);
    if (best.status !== 'Unassigned') dot = stageDot(best.status)+' ';
  }
  const fmt = topicFmt(id);
  const fromAttr = fromSlotIdx !== undefined ? ' data-from-slot="'+fromSlotIdx+'"' : '';
  return '<span class="topic-tag fmt-'+fmt+'" data-id="'+id+'"'+fromAttr+(draggable?' draggable="true"':'')+
    ' onmouseenter="showTT(event,\''+id+'\')" onmouseleave="hideTT()" onclick="event.stopPropagation();openTopicModal(\''+id+'\')">'+
    dot+id+'</span>';
}

function showTT(e, id) {
  const t = topics[id]; if (!t) return;
  const tip = document.getElementById('tooltip');
  const uses = getTopicUsage(id);
  let uh = '';
  if (uses.length > 0) uh = '<div style="margin-top:6px;font-size:10px;color:var(--secondary)">📌 '+uses.map(u=>'<span style="color:'+fmtColor(u.fmt)+'">'+u.school+' W'+u.week+'</span>').join(', ')+'</div>';
  tip.innerHTML = '<div class="tt-id">'+t.id+' <span class="lean-badge '+t.lean+'">'+t.lean+'</span></div>'+
    '<div class="tt-title">'+esc(t.title)+'</div>'+
    (t.description ? '<div class="tt-desc">'+t.description.slice(0,200)+(t.description.length>200?'…':'')+'</div>' : '') + uh;
  tip.classList.remove('hidden');
  let x = e.clientX+12, y = e.clientY+12;
  tip.style.left=x+'px'; tip.style.top=y+'px';
  setTimeout(()=>{
    const r=tip.getBoundingClientRect();
    if(x+390>window.innerWidth)x=e.clientX-390;
    if(y+r.height>window.innerHeight)y=e.clientY-r.height-12;
    tip.style.left=x+'px';tip.style.top=y+'px';
  },0);
}
function hideTT(){ document.getElementById('tooltip').classList.add('hidden'); }

  Object.keys(topics).forEach(id => {
