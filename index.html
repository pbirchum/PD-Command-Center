<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptimaEd PD Command Center — 2026–27</title>
<style>
:root {
  --navy:#06385D;--navy-deep:#042740;--navy-mid:#0a4a78;
  --cyan:#52C9E7;--cyan-dim:#3a9ab5;--cyan-glow:rgba(82,201,231,0.15);
  --white:#FFFFFF;--muted:#A8CAD9;--label:#B5D0E0;--secondary:#5A8BA8;
  --surface:#083a5e;--surface-hover:#0b4d7a;
  --card:rgba(255,255,255,0.06);--card-border:rgba(255,255,255,0.1);
  --font:'Calibri','Segoe UI',system-ui,sans-serif;--radius:6px;--radius-lg:10px;
  --fmt-live:#5B9BD5;--fmt-subject:#70AD47;--fmt-async:#BF8CD6;
  --fmt-newt:#F4B942;--fmt-k2ob:#ED7D6A;--fmt-special:#FFD966;--fmt-nopd:#7f8c8d;
  --stage-planning:#e74c3c;--stage-inbuild:#e67e22;--stage-review:#f1c40f;
  --stage-ready:#82c91e;--stage-delivered:#3498db;
  --ref-width:280px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--navy-deep);color:var(--white);min-height:100vh}
button{font-family:var(--font);cursor:pointer}
input,textarea,select{font-family:var(--font)}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:var(--navy-deep)}
::-webkit-scrollbar-thumb{background:var(--secondary);border-radius:4px}

/* ── App shell: side-by-side ref panel + main ── */
#app-shell{display:flex;height:100vh;overflow:hidden;transition:all .25s}
#main-shell{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:all .25s}

/* ── Reference Panel ── */
#ref-panel{
  width:0;height:100vh;overflow:hidden;background:var(--navy);border-right:1px solid var(--card-border);
  transition:width .25s;flex-shrink:0;display:flex;flex-direction:column;
}
#ref-panel.open{width:var(--ref-width)}
#ref-panel-inner{width:var(--ref-width);height:100vh;padding:0;overflow-y:auto;overflow-x:hidden;flex:1}
#ref-panel h3{color:var(--cyan);font-size:13px;font-weight:700;margin:0 0 12px 0;padding:16px 16px 10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--navy);z-index:5;border-bottom:1px solid var(--card-border)}
#ref-groups-list{padding:0 16px}
#ref-panel-inner>div:last-child{padding-left:16px!important;padding-right:16px!important}
.ref-group{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:8px 10px;margin-bottom:6px}
.ref-group-prefix{font-size:12px;font-weight:700;color:var(--cyan);margin-bottom:2px;display:flex;justify-content:space-between;align-items:center}
.ref-group-name{font-size:11px;color:var(--muted)}
.ref-group-fmt{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:6px}
.ref-group-count{font-size:9px;color:var(--secondary);margin-top:2px}

/* ── Header ── */
.header{background:linear-gradient(135deg,var(--navy-deep),var(--navy));border-bottom:1px solid var(--card-border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{width:34px;height:34px;background:var(--white);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.header h1{font-size:16px;font-weight:700;color:var(--cyan)}
.header h1 span{color:var(--white);font-weight:400}
.header-actions{display:flex;gap:8px}

.nav{display:flex;background:var(--navy);border-bottom:1px solid var(--card-border);padding:0 24px;overflow-x:auto;flex-shrink:0}
.nav-tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--secondary);background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.nav-tab:hover{color:var(--muted)}
.nav-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);font-weight:600}
.nav-tab .badge{font-size:10px;background:rgba(82,201,231,0.2);color:var(--cyan);padding:1px 6px;border-radius:10px;margin-left:5px}

.main{padding:18px 24px;flex:1;overflow-y:auto}

/* ── Buttons ── */
.btn{padding:6px 13px;border-radius:var(--radius);font-size:12px;font-weight:500;border:1px solid var(--card-border);background:var(--surface);color:var(--white);display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface-hover)}
.btn-primary{background:var(--cyan);color:var(--navy-deep);border-color:var(--cyan);font-weight:600}
.btn-primary:hover{opacity:.9}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-danger{color:#e74c3c;border-color:#e74c3c}
.btn-danger:hover{background:rgba(231,76,60,.15)}
.btn-ref{background:rgba(82,201,231,0.1);color:var(--cyan);border-color:rgba(82,201,231,0.3);font-size:11px;padding:5px 10px}
.btn-ref.active{background:rgba(82,201,231,0.2);border-color:var(--cyan)}

/* ── Badges ── */
.lean-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600}
.lean-badge.Technical{background:rgba(82,201,231,0.2);color:var(--cyan)}
.lean-badge.Pedagogical{background:rgba(46,204,113,0.2);color:#2ecc71}
.lean-badge.Blended{background:rgba(243,156,18,0.2);color:#f5b041}
.fmt-pill{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600}

/* ── Topic tags ── */
.topic-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;border:1px solid transparent}
.topic-tag:hover{filter:brightness(1.3)}
.topic-tag.dragging{opacity:.4}
.topic-tag.fmt-live{background:rgba(91,155,213,0.2);color:var(--fmt-live);border-color:rgba(91,155,213,0.3)}
.topic-tag.fmt-subject{background:rgba(112,173,71,0.2);color:var(--fmt-subject);border-color:rgba(112,173,71,0.3)}
.topic-tag.fmt-async{background:rgba(191,140,214,0.2);color:var(--fmt-async);border-color:rgba(191,140,214,0.3)}

/* ── Stage dots ── */
.stage-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.stage-dot.Planning{background:var(--stage-planning)}
.stage-dot.In-Build{background:var(--stage-inbuild)}
.stage-dot.Review{background:var(--stage-review)}
.stage-dot.Ready{background:var(--stage-ready)}
.stage-dot.Delivered{background:var(--stage-delivered)}
.stage-dot.Unassigned{background:var(--secondary)}

/* ── Tooltip ── */
.tooltip-popup{position:fixed;z-index:9999;background:var(--navy);border:1px solid var(--cyan);border-radius:var(--radius-lg);padding:14px 16px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:none;font-size:12px;line-height:1.5}
.tt-id{color:var(--cyan);font-weight:700;font-size:11px;margin-bottom:2px}
.tt-title{color:var(--white);font-weight:600;font-size:13px;margin-bottom:6px}
.tt-desc{color:var(--muted);margin-bottom:4px}

/* ── Schedule ── */
.ctrl-row{display:flex;gap:10px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.ctrl-row select,.ctrl-row input{padding:6px 10px;background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius);color:var(--white);font-size:12px}
.week-label{background:var(--navy);padding:6px 8px;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:10px}
.week-label .wn{font-weight:700;color:var(--cyan);font-size:13px}
.week-label .wd{color:var(--secondary);font-size:9px}
.school-col{background:var(--card);padding:5px 7px;min-height:44px;border:1px solid transparent;transition:background .15s,border .15s}
.school-col.drag-over{background:var(--cyan-glow)!important;border-color:var(--cyan)!important}
.stype-lbl{font-size:9px;margin-bottom:2px;font-weight:600}
.slot-content{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.empty-slot{color:var(--secondary);font-size:10px;font-style:italic;opacity:.4}
.special-row{padding:8px 14px;font-size:12px;font-weight:600;text-align:center;border-radius:4px;margin:2px 0}
.slot-remove{display:none;cursor:pointer;font-size:11px;color:#e74c3c;margin-left:1px;opacity:.6}
.school-col:hover .slot-remove{display:inline}
.slot-remove:hover{opacity:1}
.fmt-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.fmt-legend .li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.fmt-legend .ls{width:10px;height:10px;border-radius:2px}
.q-sep{padding:5px 12px;font-size:11px;font-weight:700;color:var(--cyan);background:var(--navy-mid);border-left:3px solid var(--cyan);margin:5px 0 2px}
.topic-pool{background:rgba(255,255,255,0.03);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:10px 12px;margin-bottom:12px}
.pool-hdr{font-size:12px;font-weight:600;color:var(--label);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.pool-body{display:flex;flex-wrap:wrap;gap:4px;max-height:110px;overflow-y:auto}
.pool-filters{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.pf-btn{padding:2px 9px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid var(--card-border);background:transparent;color:var(--secondary);cursor:pointer;transition:all .15s}
.pf-btn.f-all.active{color:var(--white);background:rgba(255,255,255,.1);border-color:var(--white)}
.pf-btn.f-live{color:var(--fmt-live)}.pf-btn.f-live.active{background:rgba(91,155,213,.15);border-color:var(--fmt-live)}
.pf-btn.f-subject{color:var(--fmt-subject)}.pf-btn.f-subject.active{background:rgba(112,173,71,.15);border-color:var(--fmt-subject)}
.pf-btn.f-async{color:var(--fmt-async)}.pf-btn.f-async.active{background:rgba(191,140,214,.15);border-color:var(--fmt-async)}

/* ── Kanban ── */
.kanban-board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;overflow-x:auto;min-height:200px}
.k-col{background:rgba(255,255,255,0.03);border:1px solid var(--card-border);border-radius:var(--radius-lg);min-height:200px;display:flex;flex-direction:column}
.k-col-hdr{padding:9px 12px;font-size:12px;font-weight:600;border-bottom:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center}
.k-col-body{padding:6px;flex:1;display:flex;flex-direction:column;gap:5px}
.k-col-body.drag-over{background:var(--cyan-glow)}

/* ── Kanban card (unified detail) ── */
.k-card{background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius);padding:10px 12px;cursor:pointer;transition:border-color .15s;font-size:12px}
.k-card:hover{border-color:var(--cyan)}
.k-card .kc-drag-handle{cursor:grab;color:var(--secondary);font-size:10px;margin-bottom:4px;user-select:none}
.k-card .kc-school{font-size:10px;font-weight:600;margin-bottom:2px}
.k-card .kc-type{font-size:9px;margin-bottom:4px}
.k-card .kc-topic{font-weight:500;color:var(--label);margin-bottom:4px}
.k-card .kc-week{font-size:10px;color:var(--secondary);margin-bottom:4px}
.k-card .kc-links{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.kc-link{font-size:9px;padding:1px 5px;background:rgba(82,201,231,.15);color:var(--cyan);border-radius:3px;text-decoration:none}
.kc-link:hover{background:rgba(82,201,231,.3)}
.k-card .kc-notes{font-size:10px;color:var(--muted);font-style:italic;margin-top:3px;border-top:1px solid var(--card-border);padding-top:3px}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--navy);border:1px solid var(--card-border);border-radius:var(--radius-lg);width:92%;max-width:660px;max-height:90vh;overflow-y:auto;padding:22px}
.modal h2{color:var(--cyan);font-size:16px;margin-bottom:14px}
.modal label{display:block;font-size:11px;color:var(--label);margin-bottom:3px;margin-top:10px}
.modal input,.modal textarea,.modal select{width:100%;padding:7px 10px;background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius);color:var(--white);font-size:12px}
.modal textarea{min-height:70px;resize:vertical}
.modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--card-border)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.modal-grid .full{grid-column:1/-1}
.used-by{margin-top:8px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:var(--radius)}
.used-by-title{font-size:11px;color:var(--secondary);margin-bottom:4px}
.modal-section{border-top:1px solid var(--card-border);margin-top:14px;padding-top:12px}
.modal-section-title{font-size:11px;font-weight:600;color:var(--cyan);margin-bottom:8px}
.file-link-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;padding:4px 6px;background:rgba(255,255,255,.04);border-radius:4px}
.file-link-row a{color:var(--cyan);font-size:11px;text-decoration:none;flex:1}
.file-link-row a:hover{text-decoration:underline}
.file-link-row .rm{cursor:pointer;color:#e74c3c;font-size:12px;flex-shrink:0}
.add-link-row{display:flex;gap:6px;margin-top:6px}
.add-link-row input{padding:5px 8px;font-size:11px}
.session-file-list{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
.sfl-item{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;background:rgba(82,201,231,.1);border-radius:3px;font-size:10px;color:var(--cyan)}
.sfl-item a{color:var(--cyan);text-decoration:none}
.sfl-item a:hover{text-decoration:underline}
.sfl-rm{cursor:pointer;color:#e74c3c;margin-left:2px;font-size:11px}

/* ── Catalogue ── */
.cat-table{width:100%;border-collapse:collapse}
.cat-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:600;color:var(--cyan);background:var(--navy-mid);border-bottom:2px solid var(--cyan-dim);position:sticky;top:0;z-index:3}
.cat-table td{padding:8px 10px;border-bottom:1px solid var(--card-border);font-size:11px;vertical-align:top}
.cat-table tr:hover td{background:rgba(255,255,255,.03)}
.tid{color:var(--cyan);font-weight:600;font-size:10px;white-space:nowrap;cursor:pointer}
.tid:hover{text-decoration:underline}
.cell-text{color:var(--muted);line-height:1.4}
.cell-ev{color:var(--secondary);font-size:10px;line-height:1.4}
.week-badge{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;margin:1px}

/* ── Evidence ── */
.ev-search{width:100%;max-width:400px;padding:7px 10px;background:var(--surface);border:1px solid var(--card-border);border-radius:var(--radius);color:var(--white);font-size:12px;margin-bottom:14px}
.ev-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px}
.ev-card-text{color:var(--muted);font-size:12px;line-height:1.5;margin-bottom:6px}
.ev-topic-pills{display:flex;flex-wrap:wrap;gap:3px}
.ev-no-topics{color:var(--secondary);font-size:10px;font-style:italic}

.stage-legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.sl-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}

.hidden{display:none!important}
@media(max-width:900px){.kanban-board{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>

<div id="app-shell">
  <!-- Reference Panel (pushes content) -->
  <div id="ref-panel">
    <div id="ref-panel-inner">
      <h3>Topic Group Key <button class="btn btn-sm" onclick="toggleRefPanel()" style="padding:2px 7px;font-size:10px">✕</button></h3>
      <div id="ref-groups-list"></div>
      <div style="margin-top:12px;border-top:1px solid var(--card-border);padding-top:10px">
        <button class="btn btn-sm btn-primary" onclick="openAddGroupModal()" style="width:100%">+ Add Group</button>
      </div>
    </div>
  </div>

  <!-- Main app -->
  <div id="main-shell">
    <div class="header">
      <div class="header-left">
        <div class="header-logo">🦉</div>
        <h1>PD Command Center <span>· 2026–27</span></h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-ref" id="ref-btn" onclick="toggleRefPanel()">📖 Group Key</button>
        <button class="btn btn-primary" onclick="openTopicModal(null)">+ New Topic</button>
      </div>
    </div>
    <div class="nav" id="nav">
      <button class="nav-tab active" data-tab="schedule">Schedule</button>
      <button class="nav-tab" data-tab="kanban">Build Tracker</button>
      <button class="nav-tab" data-tab="catalogue">Topic Catalogue</button>
      <button class="nav-tab" data-tab="evidence">Evidence Base</button>
    </div>
    <div class="main" id="main-content"></div>
  </div>
</div>

<div class="tooltip-popup hidden" id="tooltip"></div>
<div id="modal-container"></div>

<!-- Firebase SDKs: add these immediately before your existing main app script block. -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

<script>
// ════════════════════════════════
